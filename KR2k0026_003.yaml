body:
  text: 齊乘卷三元于欽撰郡邑禹貢别州以山川定經界後世地理家宗之漢志主于郡國凡山川事迹附于州縣之內世史宗之齊乘者地理之書也其於山川則法禹貢導之而未盡者依史例亦附見于郡邑之下云益都路禹貢青徐二州之域春秋戰國之齊及魯東楚北之境秦齊郡琅邪之地漢初子肥王齊有七十二城都于臨淄後置青州刺史領郡國有九此為齊郡北海千乘及徐之琅邪東海郡地武帝封子閎為齊王策曰嗚呼小子閎受兹青社蓋古者以太社五色土隨方封國使立社故齊有青社之稱後漢魏晉又為齊國樂安髙密城陽郡地而青州刺史並理臨淄永嘉之亂刺史茍晞棄青州漢將曹嶷據之以臨淄平夷難以禦敵乃於堯山南築廣固城以居降于東晉尋為石勒所陷後為段龕所據自稱齊王慕容恪滅趙克青州苻堅并燕盡有齊地堅敗苻朗以州降晉改置幽州以辟閭渾為刺史鎮廣固隆安四年為慕容德所陷德都廣固稱南燕王子超為劉裕所滅裕留羊穆之為刺史夷廣固城而歸穆之乃築東陽城為青州宋置青州理厯城後理東陽又移理臨淄後併兾州琅邪皆沒於元魏魏置青州及北徐州髙齊因之宇文周并齊置齊郡樂安北海改北徐為沂州隋並廢之大業初復為北海髙密琅邪三郡之地唐武德二年置青州總管府領州八此為青密沂三州屬河南道七年改為都督府天寶元年罷都督府改為北海郡乾元元年復為青州置平盧淄青節度石晉開運初為防禦州天福十二年復為平盧節度宋為青密濰沂四州屬京東東路淳化五年改青州為鎮海軍按會要太宗命曹彬為青州節度使中書奏云唐乾元中侯希逸為平盧節度本平州之地屢為賊所迫希逸率將士破賊又為奚虜所侵乃拔其軍二萬餘人且戰且行逹青州詔就加希逸為平盧淄青節度使自是迄今淄青節鎮皆帶平盧之名今青州頗為重地請以鎮海為額從之詔曰眷彼營丘控於東夏太公開四履之地小白舉九合之師忠烈猶存風流可尚宜改總戎之號用旌表海之邦青州平盧軍改為鎮海軍開寶五年升密州為安化軍節度元祐三年改安化為臨海軍政和元年以青州為齊郡金初屬偽齊後升為益都府太抵魏晉已前青州總治全齊為方牧之寄隋唐以降止同列郡故金太常卿范拱中和堂記云漢興田肻陳東秦形勝髙祖納之大封同姓逮至有唐分天下為十道以青隸河南止稱北海郡舉全齊之都會委之庶僚不擇重臣以為方伯此規畫之失也宋懲唐失升為帥藩總治八州由是益都復為重鎮然不升府號尚處濟南東平之下亦未為得也金於是始建府名立東路總管以十三州隸焉愚按此説非是漢祖初定天下三齊之地與關中懸隔千里非親子弟勿王懲信布也然封三庶孽分天下半亦足致亂漢初制度未必盡善唐之十道先儒謂逺不畔古近不違今其後禍亂猶階藩鎮唐制豈短于宋乎國朝沿金制以東齊業李全父子遂致跋扈擇重臣為方伯豈長䇿乎今益都以東傅海皆割入寧海般陽南則益以滕嶧東西不數百里南北僅千里焉此亦犬牙之勢也元領散府一州十三縣三十六司候録事司各四癸丑年廢各州録事司候入倚郭縣丁巳年行長山縣廢入髙苑縣至元二年割登萊二州八縣入般陽廢行淄州淄川縣入益都縣行泰安州泰安縣入沂水縣蘭陵縣入嶧州三年廢益都散府入本路昌樂縣入北海縣九年割出寧海州及牟平文登二縣延祐三年增置蒙隂縣今領州八録事司一縣二十一𨽻府者六𨽻州者十有五東至即墨五百七十里西至般陽路一百四十里南至邳州七百八十里北至濵州利津縣二百一十里東南到淮安路海寧州六百四十里東北到海二百一十里西南到濟寧路八百里西北到河間路六百五十里到大都驛程一千三百五十里徑九百里府城五門周二十里俗稱南陽城北城為東陽城東西長而南北狹兩城相對抱洋如偃月因洋以為隍因其崖以為壁蓋古者合為一城或皆羊穆之所築或後人增葺未可知也輿地記曰北齊移益都縣入青州以城北門外為治所唐通典曰今之青州理在益都縣歐陽公表海亭詩注曰南洋北洋河一在州中一在城外曽肇南洋橋記曰東陽城府治之北城也由此推之明是一城古昔全盛之時初無棄地靖康兵燼之餘金人止據北城立府後徙南城遂為瓦礫之區耳齊記補曰天會中北城頽廢移州治南陽城為益都府愚按南陽酈道元通為水名北齊嘗為龍興寺名其為城名不知所據天會金大宗之年齊記補謂是章宗時臨淄李餘慶之筆餘慶爵至開國編書如此則餘慶之文筆可知已或云後人託名以傳未必然也録事司司府城內户役初本路及沂密二州皆設録事司濰膠莒滕四州皆設司候司癸丑年並廢入倚郭縣惟隨路置焉益都縣中倚郭本漢侯國武帝封災川王子胡為益都侯故城在壽光縣南今縣境乃兩漢廣縣地屬齊郡晉廢廣縣曹嶷築廣固羊穆之築東陽皆其地元魏於夀光益城置益都縣髙齊移入青州城北門外為治所隋之北海郡唐宋之青州並理此宋以前止為縣名金因升為府號仍置縣屬焉國朝因之至元二年廢臨淄臨朐二縣并顔神鎮之行淄川縣入此縣後復置臨淄臨朐二縣顏神鎮止設巡檢而來𨽻焉初以北門外為治所後移府城臨淄縣下府北五十里古營丘齊都也晏子曰先君太公築營之丘謂築邑此地漢初齊悼惠王都此後置齊郡後漢魏晉為齊國青州理此元魏為齊郡髙齊廢入益都縣隋開皇十六年移髙陽縣理此改為臨淄縣屬北海郡唐宋並屬青州金屬益都府國朝至元三年廢入益都縣十五年復置元和志云縣理即臨淄古城然則唐縣在古城今縣理小城相去僅十里疑亦金亂所徙臨朐縣下府南四十五里古伯氏駢邑縣北七里有伯氏冢通典云古東陽城一名凡城左傳晏弱城東陽者是也漢置臨朐縣屬齊郡以縣東朐山取名晉省入昌國縣隋開皇六年改為逢山縣大業初改曰臨朐屬北海郡唐宋並屬青州金屬益都府國朝至元二年廢入益都縣十五年復置髙苑縣下府西北百六十里漢初封丙猜為髙宛侯後為縣屬千乘郡後漢晉屬樂安國髙齊改曰長樂隋開皇十八年改曰會城大業初復曰髙苑屬齊郡取髙宛故城為名唐宋並屬淄州宋景德三年以縣置宣化軍熙寧三年軍廢縣復來𨽻即縣置宣化軍使金亦屬淄州國初屬行淄州至元二年行淄州廢始來𨽻通典有漢被陽城又為狄縣地田儋兄弟殺狄令起此安帝永初二年改狄為臨濟其後省入髙苑故城在縣南樂安縣下府北九十里漢千乘郡樂安縣元帝封丞相匡衡樂安侯後漢屬樂安國晉屬樂安郡隋省入千乘縣開皇三年移於廣饒城屬青州今縣理也唐武德二年於此置乘州八年廢之縣仍屬青州宋因之金改曰樂安屬益都夀光縣下府東北七十里應劭曰古斟灌國禹後也古城在縣東説見古迹漢為夀光縣屬北海郡文帝十八年置災川國後漢併入北海災川故城在縣西隋開皇六年於縣北十里博昌故城置夀光縣唐初屬乘州後屬青州宋因之金屬益都博興州下府西北百四十里古薄姑地東南有薄姑城與漢博昌城相近十三州記云昌水其勢平博漢置博昌縣屬樂安國髙齊省之移樂陵縣理此寰宇記樂陵故城在縣東十二里隋開皇十六年復為博昌屬北海唐屬青州五代唐避李國昌諱改曰博興宋金因之厯代止為縣國朝升為州濰州下府東百三十里春秋戰國皆屬齊秦屬齊郡漢平夀縣及下密桑犢地屬北海郡後漢省桑犢餘屬北海國晉為濟南郡輿地記曰晉濟南郡領平夀下密膠東即墨祝柯五縣而以平夀為郡治考其屬邑乃漢北海平原膠東地非濟南地也元魏復北海郡髙齊改髙陽郡隋開皇十六年置濰州大業末年因賊陷俱廢唐武德三年復置濰州領北海漣水平夀華池成都下密東陽寒亭濰水汶陽膠東營丘華苑昌安都昌城平十七縣後六年唯存北海營丘下密三縣餘並廢八年州與營丘下密二縣亦廢惟以北海縣屬青州宋建隆三年置北海軍乾德三年升為濰州政和元年又改為北海軍金復置濰州屬益都元領縣三昌樂廢領縣二曰北海曰昌邑以北海為治所北海縣下倚郭應劭曰古斟尋國禹後也漢為平夀縣屬北海郡又有斟縣後漢屬北海國晉以平夀置濟南郡元魏後以為北海郡髙齊改曰髙陽隨初罷郡置下密縣於廢郡城開皇十六年於縣置濰州大業末州廢移下密於此置北海縣唐武德二年以縣置濰州八年州廢省下密入北海屬青州宋初屬北海軍後屬濰州金因之國朝至元三年廢昌樂縣入焉按昌樂即漢之營陵縣廢城在縣西元魏時嘗曰營丘非臨淄之營丘也昌邑縣下州東七十五里古鄑城左傳莊公元年齊遷紀之鄑城漢志云在都昌西此漢都昌縣屬北海郡髙祖六年封朱軫為都昌侯後漢屬北海國古城在縣南寰宇記曰都昌古城齊頃公封逢丑父食邑漢魏晉為縣後廢今為昌邑縣又云都昌漢更立昌邑縣魏晉因之按漢志武帝天漢四年更山陽為昌邑國楊震傳昌邑故城在兖州金鄉縣西北不應在此何故自相矛盾故俚俗因此誤以為昌邑令王密懷金之地隋曰昌都唐廢入北海縣宋乾德間即唐安鄉建昌邑縣屬濰州金皇統題名牌云縣邑拒海五十里濰水之下流也韓信傳又曰臺昌漢末孔北海為黃巾賊管亥所圍太史慈約昭烈救之於此密州下府東南二百八十里戰國齊地秦為琅邪郡漢為琅邪髙密城陽三郡地後漢屬琅邪北海國晉屬城陽郡元魏屬髙密永安二年改置膠州隋開皇五年改為密州大業初州廢復為髙密郡五代漢為防禦州宋因之開寶五年升安化軍節度元祐三年改臨海軍領縣五金割莒縣置莒州領縣四國朝以膠州髙密二縣置膠州領縣二曰諸城曰安丘以諸城為治所州理有中外二城外城漢東武城也其中城後魏築以置膠州隋改密州並理此城諸城縣下倚郭左傳莊公草九年城諸古城在縣西漢為東武琅邪之郡治後漢屬琅邪國晉屬東菀郡元魏屬髙密郡隋開皇三年罷郡屬膠州五年改膠州為密州縣仍屬焉十八年改東武為諸城縣大業初復屬髙密郡唐屬密州宋金皆因之安丘縣下州西百二十里古根牟國漢髙初封張説為安丘侯後置縣有兩安丘一在北海一在琅邪後漢止在北海曰古渠丘今縣鄰北海非琅邪之安丘矣元魏屬東菀郡宋屬南平昌元魏屬膠州髙齊天保七年省隋開皇十六年分昌安縣於牟鄉城置牟山縣牟鄉古根牟國也大業二年省昌安改牟山為安丘縣三年移於漢平昌城唐武德六年移今理乾元二年以安祿山亂改名輔唐五代梁開平二年復為安丘後唐又名輔唐石晉避諱改曰膠西宋開寶四年復曰安丘金因之並屬密州膠州下府東三百五十里本漢琅邪郡黔陬髙密不其縣地後漢屬北海國晉屬城陽元魏置膠州於髙密郡隋開皇初改膠州為密州並理諸城十六年置膠西縣屬髙密郡唐武德元年省膠西入髙密以其地為板橋鎮宋元祐三年復置膠西縣移臨海軍理此金亦為膠西縣屬密州國朝至元二十四年以縣置膠州以髙密即墨來𨽻膠西縣中倚郭古介葛盧國左傳襄公草四年齊崔杼伐莒侵介根杜注云黔陬東北計基城號介國漢文帝分齊立膠西國封悼惠子卬為膠西王都髙密此漢黔陬縣地晉屬城陽元魏屬髙密後屬平昌郡隋置膠西縣大業初省黔陬入焉唐省入髙密以其地為板橋鎮宋元祐三年復置屬密州又移臨海軍理此金因之大德年間東嶽廟碑云臨海軍治膠西為東武劇邑蓋控東南海道風帆信宿可至吳楚髙密縣下州西北五十里禹初封國春秋萊之夷維邑也即漢夷安城漢文帝十六年置膠西國宣帝本始元年更名髙密光武封鄧禹為髙密侯地屬北海宋孝武併北海後屬髙密髙齊省之隋復置屬密州大業初罷州復屬髙密郡唐武德六年移髙密治夷安城亦屬密州宋金因之漢淳于縣本春秋之州國髙齊省入髙密曹參傳又為假密濰水所經信參擊龍且地即墨縣下州東北百二十里戰國田單所守城臨墨水故名漢即墨縣屬膠東國後漢即墨國屬北海郡晉屬濟北郡髙齊省之隋開皇十六年於古不期城東北二十里置今縣屬萊州古即墨城在今縣西朱毛城是唐宋金因之莒州下府東南三百二十里本漢琅邪東莞東安地晉改東安為沂水縣又為南青州宇文周改曰莒州皆在沂水縣隋大業初廢之唐武德五年置莒州貞觀八年廢以莒縣屬密州沂水屬沂州宋因之金升莒縣為莒州屬益都府改日照鎮為縣併沂水來𨽻國朝因之又析沂水置蒙隂領縣四曰莒曰沂水曰日照曰蒙隂以莒為治莒縣下倚郭古莒國地志曰周武王封少昊之裔兹輿於莒始都計膠州南計斤城春秋隱二年莒人入向向莒縣也傳三十世至子朱號渠丘公為楚簡王所滅地入于齊燕樂毅破齊惟聊莒即墨三城不下漢莒縣屬城陽國文帝封朱虛侯章為城陽王都莒光武併入琅邪魏城陽郡徙治東武莒仍屬焉晉太康十年割莒縣屬東莞惠帝徙東莞郡理莒城南燕桓遵為徐州刺史鎮莒劉裕北伐遵舉城降元魏亦以莒屬東莞髙齊罷東莞郡以莒東莞二縣屬東安隋開皇初屬莒州大業初屬琅邪郡唐武德五年屬莒州貞觀八年屬密州宋因之至今置莒州以縣屬沂水縣下本春秋莒魯所爭之鄆邑十三州記曰魯昭公所居為西鄆在束平莒魯所爭為東鄆在此杜預亦云城陽姑幕縣南有員亭俗變其字即鄆也漢為東莞縣即今縣城南燕於此置縣元魏孝文改為新泰隋開皇四年改曰東安十六年於古蓋城别置東安以此為沂水縣屬琅邪郡唐宋並屬沂州金屬莒州國朝至元二年廢行新泰縣入此延祐三年復析置蒙隂州西北七十里日照縣下州東南百五十里海濵十里蓋漢海曲之地宋元祐二年置日照鎮屬密州金升為縣屬莒州南接淮安贛榆縣界有孤奎石駝山蒙隂縣下州西北二百二十里蒙山北二十五里漢屬泰山郡後漢省之晉復置屬琅邪髙齊省入新泰縣唐初置屬泰山後亦廢入新泰宋金因之國朝至元二年廢行新泰縣延祐三年析沂水之新寨鎮置此縣沂州下府南五百里春秋齊魯二國之境秦漢琅邪東海郡地初吕后封劉澤為琅邪王文帝徙澤王燕以琅邪為郡領縣五十一後漢復為國封皇子京為琅邪王自諸城徙都開陽故城是也晉武咸寧三年改封東莞王胄王琅邪薨子覲嗣薨子睿嗣是為東晉元帝即位于江東於琅邪郡城東北置發干戍以南軍鎮之後為石勒所陷乃於丹陽江乘縣别立南琅邪郡元魏莊帝置北徐州即今州理城也宇文周改為沂州隋改為琅邪郡大業末為徐圓朗所據唐武德四年平圓朗置沂州天寶元年復為琅邪郡宋金並為沂州沂水經其東南淮泗舟楫通焉領縣二曰臨沂曰費以臨沂為治所臨沂縣中倚郭本魯地春秋城中丘在縣東北漢屬東海郡後漢及晉屬琅邪國元魏改屬郯郡髙齊省隋開皇十六年置臨沂縣於古郈城在今縣東二十六里大業二年移縣於州理唐屬沂州宋金因之費縣下州西北九十里魯季氏之邑漢為縣屬東海後漢為國屬泰山晉屬琅邪國自宋至隋並屬琅邪郡大業末為賊所破唐武德四年重置屬沂州寰宇記曰漢費縣理祊城元魏太和間自祊城移縣理陽口山隋開皇三年復移入祊城今縣理是也嶧州下府西南七百五十里古鄫國通志曰鄫亦作繒姒姓子爵夏少康封其少子曲烈于鄫傳國至春秋襄公五年莒滅之鄫太子巫仕魯去邑為曾曾晳曾參其後也古鄫城在州東八十里此漢承縣地也胡氏大紀曰莒女為鄫夫人取莒公子為後與黃歇進李之妹於楚王吕不韋獻邯鄲之姫於秦公子其事雖殊其欲滅人之祀而有其國則一也故書莒滅鄫漢承縣屬東海郡承時證切晉惠帝分東海郡之蘭陵承戚合鄉昌慮五縣置蘭陵郡理承縣隋開皇三年罷郡以承縣屬徐州十六年以縣置鄫州大業二年省鄫州及承縣移蘭陵置於廢鄫州城屬徐州後為山賊左君衡所破唐武德四年復置鄫州又改蘭陵為承縣貞觀六年廢鄫州以縣屬沂州宋因之唐承縣仍理鄫州城至宋移理今縣金改曰蘭陵屬邳州國朝升嶧州初以蘭陵為倚郭縣至元二年省滕州下府西南八百里漢晉蕃音皮鄒二縣地屬魯國唐宋則徐兖二州之縣金始置滕州屬東平府元領縣三至元初割沛縣入濟寧路領縣二曰滕曰鄒以滕為治所滕縣下倚郭古滕國小邾左傳曰郜雍曹滕文之昭也文王子錯叔繡所封三十二世為齊所滅漢初夏侯嬰為滕令號滕公因秦縣也後置蕃縣屬魯國至武帝移置公丘屬沛郡晉廢公丘入蕃還屬魯國又置蕃郡髙齊廢之隋以其為滕舊都故改蕃為滕縣屬彭城唐屬徐州宋屬鄆州金以縣置滕州鄒縣下州北百里古邾國通志云顓帝玄孫陸終氏第五子晏安賜姓曹封于邾子孫以邾為姓周武王封晏安之裔邾挾為附庸自挾至儀父十二世始見春秋儀父附從齊桓定霸有功進爵稱子十四世邾文公遷于繹改稱鄒趙臺卿曰至孟子時改曰鄒矣改説非也按六書故邾鄒同聲之轉也春秋時邾莒用夷故邾謂之邾婁婁有二音合閭音為邾合樓音為鄒此本邾國耳後為楚宣王所滅遷之江夏故黃州黃岡縣有邾城古鄒國則别見濟南此兩漢屬魯國晉廢南平陽入此縣屬魯郡隋因之唐屬兖州宋屬襲慶府金屬東平府般陽府路禹貢青州之域萊夷作牧之地周禮職方之幽州春秋戰國之齊秦屬齊郡漢晉則為濟南樂安東萊郡地元魏髙齊為東清河郡及光州東牟之境隋屬齊郡及淄萊二州大業初淄州併入齊郡萊州為東萊郡唐武德元年置淄州四年置萊登二州天寶元年廢淄州為淄川縣改萊州為東萊郡登州為東牟郡並屬河南道宋置淄萊登三州屬京東東路金屬益都國初淄州屬濟南登萊屬益都中統五年置淄州路登萊二州來𨽻至元二年改為淄萊路草四年改為般陽府路元領縣六至元初割鄒平屬濟南髙苑屬益都二州帶入八縣今領州二領録事司一縣十二𨽻府者四隸州者八東到益都路百四十里西到濟南路二百二十里南到萊蕪縣百六十里北到髙苑縣百三十里東北到臨淄縣九十里東南到沂水縣二百五十里西南到泰安州二百六十里西北到青城縣百五十五里到大都驛程千二百一十里録事司沿革與益都路同淄川縣中倚郭本漢般陽縣在般水之陽屬濟南郡後漢屬齊國晉省之宋元嘉五年改貝丘縣於縣置清河郡髙齊廢郡以貝丘屬齊州隋開皇十六年以縣置淄州十八年改貝丘為淄川縣大業初州廢縣屬齊州唐武德元年復置淄州縣屬焉又析置長白縣六年省宋金因之長山縣中府北六十五里古於陵地按史記索隱曰孟子云陳仲子兄為齊卿仲子以為不義乃適楚居於陵楚王聘以為相仲子逃去為人灌園然則於陵又在楚地何也漢置於陵縣屬濟南郡故城在縣南魏晉因之宋武於此僑立廣川郡改為武強縣髙齊改廣川為平原郡隋開皇三年廢平原郡移武強縣入廢城屬冀州十六年分置淄州縣仍屬焉十八年改武強為長山縣以縣南長白山名大業初廢淄州以縣隸齊州唐武德元年置鄒州縣又屬焉八年鄒州廢仍屬淄州宋金並因之蒲臺縣中府東北二百里古有鬲氏國羿殺夏王相其臣靡奔有鬲後與鬲君滅浞立少康漢千乘郡濕沃縣後漢為鬲侯國屬平原三齊記曰秦始皇東遊於臺下縈蒲繫馬今蒲生猶有縈者臺在濵州東去此四十里名曰秦臺隋開皇十六年置蒲臺縣屬渤海唐屬淄州景龍元年屬棣州五代周世宗復屬濵州宋太中祥符五年省入渤海以其地為蒲臺鎮金復置縣屬濵州國初因之中統五年來隸新城縣中府北八十里本長山縣之驛臺鎮國朝戊子年以人民蕃聚置為縣以田索二鎮隸之萊州中府東北五百里禹貢萊夷之地周職方幽州之域史記周武王封太公於營丘萊侯聞之與太公爭營丘則萊為殷時侯國也春秋時齊侯伐萊萊共公浮柔奔棠晏弱圍棠滅之遷萊于郳棠在即墨郳在昌慮秦屬齊郡漢髙四年以韓信虜齊王廣分齊置東萊郡屬青州萊在齊之東垂也初理掖後理黃魏因之晉武太康四年徙遼東王蕤王東萊復理掖至宋改理曲城元魏皇興四年分青州置光州取界內光水名仍領東萊郡州與郡同理在掖縣髙齊宇文周並因之隋開皇初罷郡改光州為萊州大業初復為東萊郡唐武德初改為萊州天寶元年曰東萊郡乾元元年曰萊州隸河南道宋為防禦州屬京東東路金升州為定海軍節度屬山東東路國初屬益都中統五年來隸至元二年割即墨縣入膠州領縣四曰掖曰膠水曰招逺曰萊陽以掖為治所掖縣中倚郭古過國平聲寒浞封子奡之地漢志夜侯國有過鄉春秋類傳亦以有過在掖縣戰國䇿又云田單封掖邑即掖省文未知是否掖水出縣東南寒同山故以氏焉自漢以來屬東萊唐宋並屬萊州膠水縣下州南百三里本漢膠東國漢以即墨置膠東國古城在縣南後漢省為縣屬北海國晉屬長廣郡元魏屬北海郡隋仁夀元年改曰膠水屬萊州唐宋金並因之招逺縣下州東北百二十里本掖縣地有羅山金人初置羅峯鎮後升招逺縣屬萊州西北至海五十里海道東山河口至朱王海口倉百三十里萊陽縣下州東北百八十里漢縣屬東萊郡在昌水之陽故名古城在文登縣西南三十里晉初無此縣元康八年復立昌陽縣屬長廣郡今理是也髙齊天保七年廢長廣以昌陽屬東萊郡隋開皇三年罷郡以縣屬萊州唐因之五代唐莊宗避國諱改為萊陽宋金因之登州下府東北七百五十里北至海三里禹貢嵎夷之地春秋牟子國戰國屬齊秦屬齊郡漢屬東萊郡元魏屬東牟郡髙齊屬長廣郡隋開皇初屬牟州大業三年廢唐武德四年復置牟州後因文登縣人不從賊黨遂於縣理置登州貞觀元年牟登二州俱廢如意元年又於牟平縣置登州神龍三年自牟平徙登州於蓬萊鎮析黃縣置蓬萊縣今州理是也天寶元年為東牟郡乾元元年復為登州宋因之屬京東東路領縣四金初析牟平文登兩縣置寧海軍以兩水鎮為福山縣楊疃鎮為棲霞縣還登州國初屬益都中統五年來隸領縣四曰蓬萊曰黃曰福山曰棲霞以蓬萊為治所蓬萊縣下倚郭本黃縣地漢武於此望海中蓬萊山因築城以為名唐貞觀八年於此置蓬萊鎮神龍三年析黃縣置蓬萊縣宋金因之黃縣下州西南百三十里古萊子都此故城在縣東南二十五里漢黃縣屬東萊郡髙齊天保七年移今理唐初屬牟州神龍三年屬登州宋金因之漢志秦欲伐胸奴使天下飛芻挽粟起於黃腄直瑞切琅邪負海之郡腄即文登黃即此縣福山縣下州東南二百八十五里本漢腄縣地舊為兩水鎮屬登州金偽齊阜昌二年置福山縣屬登州棲霞縣下州南百五十四里腄縣地舊為楊疃鎮亦偽齊所置寧海州下禹貢嵎夷周禮幽州域春秋萊國秦齊郡之東腄漢東牟不夜縣地後漢為牟平侯國並屬東萊郡魏晉止為縣髙齊天統四年分置文登縣屬長廣郡隋開皇三年改長廣為牟州以文登縣屬萊州大業二年亦廢牟州入萊州唐武德四年又於黃縣東中郎城置牟州文登縣置登州領文登觀音貫陽二縣六年以觀陽屬牟州又置清陽廓定二縣屬登州貞觀元年二州三縣俱廢入文登如意元年復登州神龍三年登州徙置蓬萊鎮麟德二年復置牟平屬登州宋因之金初偽齊劉豫以兩縣置寧海軍大定草二年升