中統元年置濵棣路安撫司至元二年隸濟南路領縣四曰厭次曰陽信曰商河曰無棣以厭次為治所厭次縣中倚郭漢髙祖初封爰類為厭次侯至文帝國除明帝永平五年更富平為厭次縣屬平原郡相傳秦始皇東遊厭氣次舍於此故名魏晉屬樂陵元魏時徙縣治馬嶺城今陽信縣東馬嶺城是髙齊省之隋開皇十三年復置於樂陵屬北海十七年屬滄州大業初屬渤海郡唐武德四年屬棣州貞觀後徙州治此邑五代梁徙州東南縣隨之宋大中祥符間與陽信縣互易仍為州理水經闕駰注曰厭次縣富平侯張安世封邑按本傳昭帝元鳯六年封安世富平侯薨子延夀嗣國在陳留别邑在魏郡租入嵗千餘萬延夀自以身無功德何能久堪先人大國上書讓減户邑天子以為有讓徙封平原并一國户口如故而稅減半然則陳留之富平乃安世始封平原之富平延夀之徙封也漢功臣之世保國長久未有若富平者豈非安世父子謙抑之所致可為後法也陽信縣中州東北四十五里本漢縣屬渤海郡髙祖初封吕青為陽信侯文帝復以封劉揭王莽省之後漢延光元年復置魏晉皆屬樂陵元魏因之至髙齊廢隋開皇初後置屬滄州十七年屬棣州大業初又屬滄州唐武德四年以縣置棣州六年州廢縣屬滄州貞觀十七年還屬棣州宋因之大中祥符間與厭次縣互因其地今因之大統志晉東海王越斬汲桑於此按通鑑荀晞破汲桑桑奔馬牧為人所殺故此不録商河縣中州西南九十里本漢平原朸音力縣地武帝封城陽王子讓為侯晉置漯沃縣音它合反隋開皇初於漢朸縣故城置滳河縣取縣南商河漢河隄都尉許商疏鑿後人加水為滳以為名也初屬滄州後屬棣州大業初屬渤海唐貞觀元年割屬德州十七年還屬棣州宋因之前此皆稱滳河至宋去偏傍為商河豈以紹聖間河決壞城大觀修復之後字從改耶然不可考矣金因之無棣縣下齊履此境漢陽信地陽信故城在縣東南三十里隋開皇六年置縣取縣南無棣溝為名唐貞觀初省入陽信八年復置屬滄州太和二年屬棣州尋屬滄州五代周顯德五年改為保順軍宋復為無棣縣屬滄州金因之國朝割無棣縣半入滄州以縣領三鄉來屬而滄州亦有無棣故此又稱東無棣云濵州中府東北三百五十里漢渤海郡地沿革同棣州五代之際置𣙜鹽務於海濵因立贍國軍周顯德三年始割棣州之渤海蒲臺兩縣置濵州宋因之初省蒲臺入渤海慶厯六年又析置招安縣金復置蒲臺縣大定十三年於此立鹽使司後又析置利津縣改招安曰霑化國初濵棣自為一道中統三年置濵棣路宣撫司中統五年割蒲臺縣入淄州至元二年隸濟南路領縣三曰渤海曰利津曰霑化以渤海為治所渤海縣中倚郭唐垂拱四年析蒲臺置渤海縣天寶五年以地斥鹵西徙四十里李丘村縣焉周顯德三年以縣置濵州宋金並因之利津縣下州東六十里本渤海縣之永利鎮金明昌三年置為縣霑化縣下州北六十里宋慶厯三年招撫海寇得安即其地置招安縣熙寧六年省為鎮元豐二年復為縣金明昌四年改曰霑化取龔遂為渤海太守海濵之民復霑聖化立名德州禹貢兖州之域春秋戰國齊之北境秦屬齊郡漢髙祖分齊置平原郡後漢及魏晉以為宗王封國元魏復為郡孝文太和中移郡於安德故城改為安德郡隋開皇元年廢郡入冀州九年以郡置德州大業三年州廢復為平原郡唐武德四年平竇建德復置德州又置總管府領博德棣觀四州七年改屬都督府貞觀二年廢督府割滄州之滳河厭次二縣來屬十七年二縣還屬棣州以廢觀州之蓚縣安陵來隸天寶元年改為平原郡十四年安祿山反平原太守顏真卿據郡討賊初明皇聞河北郡縣皆從賊歎曰二十四郡曽無一人義士耶及真卿報至大喜曰朕不識顏真卿作何狀乃能如是欽按三代之後天下承平富庶莫如明皇始禍致亂毒流後代亦莫如明皇蓋其初政識姚宋晚年識李楊斯二人者天下皆識其心術明皇但識其形狀故能敗亂天下至於真卿兄弟巡逺諸賢皆所不識而竭忠許國乃能如是自古識者不賢賢者不識信者不忠忠者不信豈特明皇而已哉此禍亂所以相尋也乾元元年復為德州屬河北道五代晉天福間移州理長河縣宋復還安德展其城景德三年刺史江日新展築亦屬河北金屬山東東路國初屬東平路至元五年直𨽻省部仍割大名之清平濟南之齊河兩縣來隸領縣五曰安德曰平原曰齊河曰清平曰德平以安德為治所東到商河縣百八十里西到陵州七十里南到髙唐州百四十里北到吳橋縣七十里到大都八百里東北到寧津縣百里東南到禹城縣百一十里西南到恩州百一十里西北到景州二百里安德縣中倚郭漢為縣後漢為國皆屬平原元魏以縣置安德郡隋開皇初復為縣屬冀州九年於縣置德州五代石晉徙州理長河以縣為屬邑宋嘉祐中復為州理今因之平原縣中州西南五十里漢平原郡平原縣有篤馬河東北入海五百餘里今枯河猶存韓信夜渡平原襲齊厯下軍渡此河也髙齊併鄃縣入此古城在縣西光武封馬武此邑元魏置東青州尋廢屬安德郡隋開皇初郡廢屬冀州九年改屬德州唐太和二年屬齊州尋復屬德州宋金因之齊河縣中本宋濟南之耿濟鎮漢耿弇討張步自朝陽濟河即此地金劉豫家此鎮僭位後置為縣屬濟南大定八年始城之國朝至元二年來隸清平縣中州東百八十里本漢清河郡之清陽縣隋開皇初徙貝丘縣置此十六年改曰清平屬博州大業二年屬貝州唐武德四年屬博州宋屬大名府舊邑在縣西四十里清平鎮元豐間漯河決壞城徙置博平縣之明靈寨今理是也金因之國朝至元二年來𨽻德平縣下州東八十五里本漢平原郡平昌縣漢文四年封齊悼王子卬為平昌侯元魏永熙二年移古城隋開皇十三年屬滄州後還屬德州唐因之五代唐避諱改德平宋熙寧六年省為鎮元符二年復置屬德州金因之齊邑外屬髙唐州之髙唐縣本漢平原郡地理志平原郡有髙唐則漢縣也曹州之禹城縣濟南西五十里古祝國黃帝之後杜征南釋地曰濟南祝阿縣西北有轅城有髙唐城春秋時齊邑漢祝阿縣屬平原郡隋屬齊州唐天寶元年改曰禹城取縣南禹息古城為名安史之亂義營防遏將軍李銑決河水以限賊縣為水壞乃北徙八十里移縣置遷善村為今理故禹城在豐齊之北宋金並屬濟南國初乙未年屬曹州有阿陽城漢縣也在廢禹城西北隋開皇初此城側得古塜石銘云阿縣令李君墓龍額城亦漢縣在廢禹城東南古髙唐城在南五十里瑗城在南百里春秋晉趙鞅代齊取犂及轅杜云犁一名隰轅即瑗也原陽城唐縣亦在南百里廢禹城在南八十里泰安州之長清縣濟南西南七十里本盧地齊公子傒食采於盧漢為縣屬泰山郡元魏孝昌二年自山茌故城移東太原郡置此後廢隋開皇五年置長清鎮取清水為名十四年改為縣屬濟州唐貞觀十七年屬齊州宋因之至道二年徙治剌榆店今縣理金亦屬濟南國初乙未年屬泰安東昌路之聊城縣濟南西三百里齊西鄙之邑水經注云聊城縣東北三十里有故攝城左傳所謂聊攝以東是也戰國時燕將保聊城田單攻之不下魯仲連為書約之矢射城中燕將見書自殺兩漢屬東郡魏晉屬平原因為郡治焉隋初屬博州大業中屬武陽郡唐宋並屬博州國朝屬東昌路倚郭按漢志千乘郡别有蓼城縣後漢為蓼侯國注云東北有攝城此古齊聊攝也今人皆以東昌之聊城當之故略具同異云茌平縣聊城縣東北七十里左傳哀八年齊取闡杜注云漢東郡茌平縣北有闡鄉茌平至晉末圯於河後魏廢入聊城唐武德初以聊城之興利鎮復置貞觀八年又廢至今劉豫始復屬博州國初撥屬東昌石勒賣為師歡奴耕田聞鼓鞞之聲縣西南地名牛叢塊相傳是其舊耕之地李陽爭漚麻池今有大李莊陽歡之裔猶存未知是否淳于髠墓在縣西又唐馬周五代葛從周皆有墓土人名曰葛塊東平路之東阿縣濟南西百二十里齊之柯邑春秋莊公十三年會齊侯盟于柯曹沫劫盟於此漢為東阿縣兩漢有阿陽無東阿記誤魏封曹植地晉屬濟北國隋屬濟北郡唐初屬濟州天寶十三載屬鄆州金宋並屬東平有阿井貢膠井今在閘河之西陽穀縣東阿西南百里春秋僖三年齊侯宋公江人黃人會於陽穀隋開皇十六年始置陽穀縣屬濟北郡唐初屬濟州天寶十三載屬鄆州宋開寶六年縣城圯于河太平興國四年徙置上巡鎮金因之國朝屬東平阿井在縣東北金天眷間重修有碑存今復廢縣東北安樂鎮相傳周世宗養疾於此河間路之臨邑縣濟南北百里漢臨邑縣屬東郡宋孝武孝建二年立東魏郡理臺城以臨邑縣屬焉隋開皇三年罷郡屬齊州唐初屬談州後屬齊州宋因之建隆初以河決壞城徙治孫耿鎮此亦漢濟南著縣平原隰隂縣地隰隂齊桓封公子廖之地漢為縣古城近在縣西十里又名黎丘著城在縣東南五十里古相傳地貢神蓍按師古曰著音竹庶韋昭誤以為蓍龜之蓍失之逺矣後人緣此有貢蓍之論齊東縣舊趙巖口金為齊東鎮後在劉豫置夾河巡檢司以瀕大清河故名夾河金亂天兵南下城之壬子年因置齊宋縣屬河間路癸丑年割屬濟南至元二年還屬河間縣管窵户郭外皆章丘鄒平地屬濟南故附見云齊乘卷三
