body:
  text: 齊乘卷四元于欽撰古蹟類例有四各以類書近而相證者則聮書不拘以類一曰城郭記古井邑二曰亭館該乎棟宇三曰丘隴丘陵墳衍系焉四曰志聞碑銘詩說終焉凡此皆古人之蹟也蹟於書者人存其政舉蹟於地者人亡其跡亡過黍離而興悲臨廣武而有歎曠千載而相感者其在兹歟城郭廣縣城益都府南瀑水澗側漢廣縣故城元魏嘗以置青州遺址猶存土人目為古青州廣固城府西北堯山下齊記云晉永嘉五年刺史曹嶷所築有大澗甚廣因之為固故曰廣固初南燕慕容德議所都潘聰曰青齊沃壤號曰東秦地方二千戶餘十萬四塞之固負海之饒可謂用武之國廣固者曹嶷所營山川阻險為帝王之都德從之及劉裕圍慕容超城側有五龍口險阻難攻兵力疲乏河間人𤣥文說裕曰昔趙攻曹嶷望氣者謂澠水帶城未易攻拔若塞五龍口城當自破石季龍塞之嶷果請降後五日雷雨震開之慕容恪攻段龕亦塞五龍口龕遂降今舊跡猶存宜試修塞裕從之超城中男女皆患腳弱病者大半遂出奔為裕所擒此緣城閉日久氣鬱不通自然生病自古兵革間多有之裕不學故為𤣥文所誑耳其城為裕所平無復遺跡臨淄古城臨淄縣北雉堞猶存齊記補謂齊古城周五十里高四丈十三門其西雍門韓娥鬻歌之地又有稷門下立學舍所謂稷下學齊宣王聚文學游說之士鄒衍淳于髠田駢騶奭接子愼到環淵之徒皆賜列第為上大夫縣北有大夫店由此取名不治而議號稷下學士荀卿嘗為稷下祭酒又鄭康成云齊田氏時學舍所會號棘下棘稷音相近即稷下也亦城內地名左傳陽虎劫公伐孟氏入自東門戰于棘下西南有申門門外申池左太冲賦謂之照華池郡國志謂之左右池即系水原也北曰章華門史記蘇代自燕入齊見於章華門者是也城東北五里餘有雪宫遺址見寰宇記又西北系水之側有梧臺水經注楚使聘齊齊王饗之梧宫臺臺甚層秀東西百步亦宋愚人得燕石之處有漢熹平五年碑題云梧臺里又南歇馬臺土人以為晏子作歌之臺或又以為簡公之檀臺皆不可考齊城在戰國時蘇秦謂城中七萬戶漢高又溺愛外婦子以齊言者皆封之故齊地惟此城獨大意其全盛之時車轂擊人肩摩連衽成帷舉袂成幕揮汗成雨者信不誣矣石槽城臨淄東十里即古安平城因城內有石槽故名魯莊公三年紀季以酅入于齊杜注齊城東安平縣有紀季墓北有冢土人云蔽無秦冢疑即季墓田單封安平君即此西安城臨淄西三十里耿弇討張步謂西安小而堅即此東有畫邑城王蠋鄉也弇進軍畫中居兩城之間路史云風俗通有齊大夫晝氏邑孟子宿晝晝在臨淄畫在西安今即畫水號宿留水晝乃畫之訛不應有二索頭城臨淄東南二十里女水之南後魏慕容白曜圍沈文秀於青州築此城因有索頭村朱虛城記云臨朐東六十里孔融為黃巾賊所敗曽保此城蓋融保都昌與此相近又有東陽城亦曰九城左氏曰晏弱城東陽又有挍音效城武帝封城陽王子雲為侯臨原城封菑川王子始昌為侯皆在臨朐東見寰宇記斟灌城夀光東四十里寰宇記云斟灌城亦名東夀光自金為斟灌店按有窮后羿拒太康代夏政仲康子相位依同姓諸侯斟灌斟尋氏羿相寒浞殺羿使其子澆即奡也殺斟灌以伐斟尋滅夏后相后緡方娠逃出自竇歸于有仍生少康焉杜征南謂夀光縣東南有灌亭漢北海郡有斟縣應劭謂平夀為古斟尋東南有斟亭京相璠曰斟尋去斟亭七里然則斟國在齊明矣皇甫謐乃謂斟灌在衛臣讃謂斟尋在河南引夏都為證顔監曰應氏止云斟尋本是禹後何預夏國之都乎瓚說非是紀城夀光南三十里春秋之紀國通志曰紀本在東海贛榆後遷劇亦稱紀城內有臺高九尺俗曰紀臺城旁有劇南城漢劇縣也爾雅云七達謂之劇驂北海劇縣有此路王胡城夀光北二十里古益都城也漢武元朔元年封菑川懿王子胡為益都侯薨子廣嗣廣薨子嘉嗣元鳯三年坐非廣子免益城夀光南十里漢益縣城寰宇記以為益都城云魏始于此立縣非是土人稱王子胡者正益都城耳豐城夀光西二十里輿地記本漢菑川國城司馬懿伐公孫淵北徙豐人住此改曰南豐城樂望城夀光東二十里漢宣帝封膠東戴王子先為樂望侯今曰王望店王望北十餘里又有古城土人名曰女直營金人屯兵之所延鄉城水經注千乘有延鄉城世謂之從城延從字相似野溝水出此西北入時水今樂安西北有此城漢元帝封李談延鄉侯俗又云會城千乘城郡國志高宛縣北二十五里古千乘縣以齊景公有馬千駟畋于青丘得名縣北有青丘濼即今清水泊也又子虛賦注曰青丘山名出九尾狐在海外蓋瀕海耳漢高置為郡和帝更名樂安國千乘縣並屬焉至隋開皇初移縣置廣饒此城遂廢其東復有漢利縣古城云被陽縣寰宇記高苑縣西南漢武封齊孝王子燕為被陽侯廢濟陽城唐景龍元年析高苑置在濟水之北尋廢故城在縣北九十餘里薄姑城元和志在博昌東北六十里即殷末薄姑氏舊都今博興東北俗呼為嫌城者是又書序成王伐奄遷奄君於薄姑奄在魯不知薄姑又是何地博昌古城博興南二十里漢博昌縣城在金為博昌鎮或亦呼為薄姑城非是西對古城即延鄉也利城樂安西北二十里漢齊郡利縣平夀城濰州西南三十里漢縣古城又有廢下密城在州西三里隋開皇中於北海縣置濰州移下密縣於此大業二年併入北海此謂西下密東四十五里有東下密隋開皇中分下密東界為膠東縣唐武德初廢此城今在昌邑東南俗呼密城拒州不止四十五里又東南有後魏皇興初所置膠東縣城州東南三十里有漢桑犢城並見寰宇記白狼水出小王莊正桑犢地廢昌樂城濰州西五十里古緣陵春秋淮夷病祀諸侯城緣陵而遷杞齊侯與之車百乘甲一千此城東南十餘里有營陵城又南安丘北海界上有起城營陵即緣陵見漢書注起即杞耳在漢曰營陵縣元魏又曰營丘謂即太公所封者非是唐初權置杞州後為縣宋改曰安仁尋又改曰昌樂國朝至元三年廢入北海今廢城內右玉華宫舊名神遊觀宋宗室淄王瑞華堂碑刻在焉訾城昌邑縣西北海濵春秋齊師遷紀郱鄑郚杜注北海都昌西有訾城則鄑地俗呼為瓦城半為水漸城南有孫武廟營城昌邑南五里有大營城北五里有小營城南城即古都昌不知何故謂之營城豈孔北海與黃巾相拒屯兵遺跡邪古諸城密州西南三十里春秋時魯邑季孫行父城諸及鄆姑幕城商侯國漢晉為縣郡國志引博物記曰城東南五里有公冶長墓寰宇記則謂長墓在密州西北五十里姑幕在莒縣東北百六十里詳此則姑幕城當在密州昌安城安丘縣之外城漢石泉城後漢併入昌安在縣西南十里寰宇記謂之安昌城今按張禹封安昌侯乃汝南之縣又云西南十二里自安丘城實一城耳記皆誤平昌故城安丘南六十里漢平昌縣屬琅邪亦為侯國文帝封齊悼王子卭為平昌侯後徙封膠西王郚城安丘西南六十里春秋齊遷紀郱鄑郚杜注朱虛縣東南郚城漢為梧成縣後魏於此置平昌郡高齊改為琅邪縣隋改曰郚城大業末廢淳于城安丘東北濰汶二水交處古有此城按通志武王封禹後東樓公於杞汴梁杞縣九世成公遷于緣陵濰州昌樂至文公又遷居淳于號州公春秋州公淳于如曹是也後為杞所并遷江南杞東樓之孫周亦封于牟婁隱四年莒人伐杞取牟婁今諸城北有婁鄉安丘南有牟婁山俗訛作朦朧山即其地城陽城安丘南八十里漢城陽國亦曰龍臺城城內有臺高六丈臺下有井與荆水通失物於井或於荆水得之有神龍出入其中故曰龍臺瓶城安丘南與郚城相近漢武封菑川靖王子成為瓶侯計斤城膠州南五里春秋之介根漢計斤縣語音有輕重耳莒子初都此後徙莒今有兩塔對立曰東西計斤袚城音廢膠州西南七十里漢袚侯國屬琅邪俗曰肥城廢音之轉也記謂袚城無跡可考當在臨朐者非是黔陬城高密縣西六十里兩城夾膠水而立縣道記曰黔陬秦所置在高密郡東北古介葛盧國也後移縣於膠水西相去三十里謂之東西二城高齊天祿間廢介葛盧墓在東城側龍且城高密西南四十里濰水之東楚將龍且所築水西即且冢冢南曰梁臺韓信囊沙壅水之地亦曰城陰城夷安城路史云夷安古維國有維水寰宇記謂今高密縣理東南外城即夷安城晏子萊之夷維人漢為縣屬高密國詳此則今縣理正古夷安城西北舊城乃宋縣耳高陽城高密西北三十里漢成帝封淮陽王孫並為侯一名膠陽亭大業末廢今有高陽村稻城高密西南濰水堰側土人呼堰為趙貞女防南有高堤謂是彭岑冢皆謬此即稻城遺跡春秋稱琅邪之稻自漢有塘堰蓄濰水以溉稻因名其城武帝封齊孝王子定為稻侯郡國志亦謂之鄭城康成故宅在此旁有稻田萬頃斷水造魚梁嵗收億萬號萬匹梁今其遺跡鞠為榛莽矣櫃城高密南三十里漢縣根艾水出此東入海今曰櫃城河古膠西城高密東南二十五里膠墨二水之間隋置膠西縣在此大業末廢于賊土人呼為諸晏城以前有晏子冢故也不其城即墨西南二十七里漢琅邪郡不其縣有太乙仙人祠及明堂武帝所起寰宇記云古城約周十餘里後漢改屬東萊晉於此置長廣郡高齊廢之隋開皇十六年於此城東北二十七里置即墨縣今故城在縣西南臯虞城即墨東五十里漢武帝封膠東康王子建為侯以旁有王吉廟亦曰琅邪城又西有祝茲城漢初徐厲及康王子延年皆封祝兹侯而兩漢無此縣蓋是鄉聚之名取為國號耳公孫𢎞封平津霍光封博陸之類是也壯武城地記即墨西六十里古夷國漢壯武縣屬膠東國晉封張華為壯武侯今華廟在膠州西南即壯武地莒城莒州治外郭周四十餘里內城周二十里子城周十二里寰宇記曰縣理在故城城三重皆崇峻惟南開一門無知之難小白奔焉樂毅攻齊守嶮全國列女傳齊人杞梁殖襲莒戰死其妻哭于城下七日而城崩琴操一說殖死妻援琴悲歌曰樂莫樂兮新相知悲莫悲兮生别離哀哉皇天城為之崩一說妻泣曰上則無父中則無夫下則無子人生之苦至矣乃放聲長號杞城為之頺遂投水而死其妹朝日悲之為作是歌皆後來追述後說近是海曲城莒州東百六十里地有東吕鄉太公望所出後漢紀琅邪吕母結衆為子報仇殺縣長起此赤眉皆其黨今有吕母固曹公城莒州南二十里魏武征陶謙所築今曰五花營高鄉城莒州東南七十餘里漢侯國宣帝封城陽惠王子休為侯晉永嘉後城廢疑即今十字路城又有高廣新山昆山皆漢侯國並在州南無迹可考箕城莒州東北百里箕屋山下濰水出此漢宣封城陽荒王子文為侯折泉城漢侯國記附密州亦云失其所在然水經析泉水出松山今曰分流山在馬耳山西城當屬此地團城沂水東北三十里城正圓因名團城隋開皇十六年嘗於此置沂水縣後廢為鎮蓋城沂水西八十里蓋公先國陳仲子兄戴蓋祿萬鍾即此漢為縣景帝封王皇后兄信為侯隋開皇中於此城置東安縣後廢入沂水向城沂水西南春秋隱二年莒人入向通志云沂州有古向城寰宇記云夜頭水一名向水經漢椑城南入海向城在莒縣南蓋今沂州之向城鎮是也郈城沂州東三十六里左傳定公十年叔孫州仇帥師圍郈隋開皇十六年於此置臨沂縣大業二年移縣於今州理此城遂廢通志郈邑又在鄆州須城非是即丘城沂州南五十里路史云祝丘祝融氏之後臨沂東南五十里即丘城是也桓五年城祝丘齊魯之音祝即相近漢為即丘縣至高齊廢今州西三十里乃漢厚丘城土人以為即丘州南即丘為新城皆誤開陽城今曰鄅城沂州北十五里古鄅國祝融之後風姓又云夏禹之後昭公十八年邾人入鄅杜注謂琅邪開陽開本作啓叔孫州仇城啓陽是也漢避景帝諱改為開漢官儀曰洛陽城南東第一門始成夜有一柱止樓上開陽縣上言南門一柱飛去即洛城門柱也光武建武四年封子京為琅邪王初都莒莒有城陽景王祠神數下言宫中多不利京上書願徙開陽肅宗許之今城側有京冢廟郯城沂州東南百草里通志曰郯祈姓子爵或曰嬴姓少昊之後春秋時郯子朝魯能辨古官仲尼師之城內郯子宣聖共廟後漢志郯有勇士亭古勇士萬丘欽也王僧辨城沂州東北四十里梁將王僧辨所築土人目為諸葛城不知所據又州城東北有小營城晉元帝之發于戍營也鐘離城沂州西南百餘里路史云鐘離徐之别封今沂之鐘離城乃晉吳會處其後徙九江吳滅之郡國志謂此城楚將鐘離昧所築按韓信傳昧家在伊盧東海戚朐有此邑城或於其鄉邑耳昧素與信善羽敗昧亡歸信信時為楚王及高祖僞遊雲夢信恐見禽或說信斬昧謁上必喜亡患昧曰漢所不取楚以昧在公若捕我以自媚吾死公隨手亡矣乃罵信曰公非長者卒自剄信持其首謁陳為高祖所擒先儒謂李廣之不侯以斬灞陵尉欽亦謂信之不終以負鐘離昧且樊於期以窮歸燕太子丹猶不忍負况昧楚之忠臣己之良友以窮來歸乃始容而後負之可乎以信之智獨不能如魯朱家為季布地乎信罪大矣襄賁音肥城鐘離城相對漢末劉虞初封容丘侯進封襄賁侯虞郯人也故封鄉國俗訛作鑿城古費城費縣西北二十里古費伯國姬姓懿公之孫後為季氏邑顓臾城在北所謂固而近於費古武城費西滕東兩縣之間子游絃歌舊邑南成城費縣南百餘里齊檀子所守漢侯國屬東海因南成山而名漢末黃巾之亂鄭康成避難此山有注經石室祊城夲陽口城左傳隱公八年鄭伯請釋泰山之祀而祀周公以泰山之祊易許田許在鄭地祊即此城寰宇記云自漢費縣移理祊城後魏大和間自祊地移縣於陽口山隋開皇三年復自陽口移入祊城即今縣理也土人乃以陽口城為祊城又呼為許田城皆誤古承縣城嶧州城西北小城寰宇記曰前承縣理今縣西一里漢承縣古城也晉已後蘭陵郡或理今州城或理鄫此城自為承縣宋始移焉古鄫城嶧州東八十里夏少康封少子曲烈于鄫傳國至春秋襄公六年莒滅之後屬楚漢晉並為繒縣其後省入蘭陵隋初鄫州理承縣城大業二年始移蘭陵郡理此後為山賊左君衡所據唐武德初平賊復置鄫州理此城郳城鄫城南邾夷父顔有功于周次子友父别封小邾為魯附庸居于郳樂史云郳城在承縣土人曰小灰城小邾之訛也蘭陵城州東南六十里古魯之次室邑列女傳魯次室女倚柱而歎曰君老太子幼諸女笑之次室女曰君老必愚太子幼必悖愚悖之間其亂必生竟如其言次室邑後為楚地改曰蘭陵春申君封荀卿為蘭陵令城南有荀卿墓城北有蕭望之墓欽按君老子幼不得伊周之付託必亂然未亂而先見者少矣以荀卿之智尚不鑑黃歇之敗次室女其賢乎逼音福陽城州南五十里古妘姓之國祝融之孫陸終第四子求言封於逼陽後為晉所滅後漢為𫝊陽縣屬彭城古薛城滕州東南五十里薛任姓顓頊少子陽封於任十二世孫奚仲為夏車正禹封為薛侯遷于邳至孫仲虺為湯左相復居薛六十四世至愍侯洪為齊所滅奚仲廟在城中墓在城南齊封靖郭君田嬰於此郡國志孟嘗君時薛城中六萬家其城高厚無比以抗楚魏也至今多英傑子弟蓋有文之遺風文父子墓並在焉水經注云冢結石為郭作制嚴固瑩麗可尋今墓已開發內如宫室以銅鐡鑄壁扣之有聲堅不可動仲虺城俗曰斗城薛城西三十里晉太康地記曰奚正遷于邳其後仲虺復居此漷水經城北西入于泗滕城州西南十五里古滕國城秦縣之漢初夏侯嬰初為滕令號滕公因秦舊孝武改為公丘故地志以為公丘城濫城州東南六十里左傳邾黑肱以濫來奔又名昌慮城後漢建安中曽於此立昌慮縣有藍鄉即此邑或又名戚城漢戚朐縣亦屬東海古邾城鄒縣南周武王封祝融安期之裔挾於邾為魯附庸十二世至儀父始見春秋齊桓興霸儀父附從進爵稱子又十四世至邾文公乃遷于繹繹本鄒山故亦稱鄒此城蓋其始封之邑也漢嘗以為南平陽鄒城嶧山南二里邾遷於繹依繹山以為邑漢志曰城東門外有韋賢墓今此山前古城猶存石表大刻曰漢丞相韋賢之墓此亦漢縣也逢陵城般陽府東北四十里逢伯陵商之諸侯封于齊薄姑氏代之後太公又代之逢蒙逢丑父皆其後或曰此即丑父之邑也反蹤城般陽北記謂齊景公失馬尋蹤遂得于此輿地記云魏明帝景初二年以遼東新沓民渡海來歸於此置新沓縣以居之萊蕪城般陽東南六十里齊靈公滅萊萊人播遷於此邑落荒蕪故稱萊蕪後漢范史雲為萊蕪長清儉守節百姓歌之曰甑生塵范史雲釡生魚范萊蕪即此邑城西有韶山出鐡代置鐡官范史雲名丹於陵城長山縣南二十五里風俗通曰陳仲子齊世家辭爵灌園居於於陵史記謂於陵在楚路史謂於陵商世侯國在淄之長山者是余按仲子亦高潔矣孟子但譏其避兄離母或至敗倫亂俗後世亦曷常有斯人哉正足以勵衰俗耳高苑故城長山北二十里苑城店因此名古濟南郡城長山西北蓋漢濟南郡理也曲成城萊州東北六十里海邊漢曲成縣參山萬里沙皆在此晉改為曲城隋末廢唐武德四年復六年又廢當利城萊州西南四十里漢當利縣至高齊廢又有陽樂城在當利北陽石城即陵石侯國在當利南皆漢縣也見十三洲記臨朐城萊州北二十餘里漢縣顔監曰齊城已有臨朐而東萊又有此縣各以所近為名縣道記城在海水祠北約五六里去海二十里然今海廟宋初所建去海才二三里與古不同矣沙丘城萊州北相傳商紂所築始皇崩處按史漢皆云沙丘在巨鹿縣此後人附會挺城徒鼎反萊陽縣南七里漢挺縣屬膠東國廢昌陽城萊陽東南二十餘里隋大業間築唐永徽初為水壞長廣城萊陽東五十里貕養澤在西漢縣屬琅邪後漢屬東萊高齊置長廣郡於中郎城後移郡於膠東此城遂廢此即中郎故城耳郡國志石勒遣中郎將石同築此以防海故名中郎城古即墨城膠水縣東南六十里正田單火牛城也漢膠東國領八縣理此俗曰朱毛城北數里有樂毅城毅圍即墨時所築平度城膠水縣西北六十里漢縣膠水經此城北入海又盧鄉亦漢縣高齊併入膠東故城在平度南十餘里鯀城登州南十五里此亦有羽山相傳是魏將田預所築城近羽山取殛鯀為名烏湖戍登州北海中二百六十五里大謝戍北海中三十里二戍皆唐太宗征高麗所置後遂為鎮永徽始廢故牟平城州東南九十里漢縣城高齊天保七年移縣置馬嶺山此遂廢古萊子城黃縣東南二十五里古萊子國都地名龍門山峽之間鑿石通道極為險隘土人曰萊子關路史謂即萊朱國大入城黃縣東北二十里司馬懿伐公孫淵築此城以運軍儲徐鄉城漢縣蓋以徐福求仙為名成帝封膠東恭王子炔為侯士鄉城鄭康成謂越有君子軍齊有士鄉城圖記皆云在黃縣按管仲制國為二十一鄉工商之鄉六士鄉十五豈一城邪㡉城黃縣西南二十五里漢縣有百支萊王祠高齊天保間廢腄音縋城寧海州東三十里秦漢負海縣後併入牟平唐初置清陽縣後廢入文登城對之罘山臨清陽水故名清陽城清陽漢志作聲洋丹水所出東北入海育犂城寧海州西北八十里漢縣後漢省入牟平在㵐港水側其地良沃故名育犂東牟城寧海州文登縣西北十里漢縣高后封齊悼王子興居為東牟侯不夜城文登東北八十里海濵漢志云古有日夜出見於東萊萊子立此城有成山日祠雞鳴島解道虎云不夜在陽庭城東南陽庭有青城山始皇射魚處今按青城山即之罘山也因腄名清陽城之罘號青城山陽庭即腄城是東平陵城濟南東七十五里春秋談國齊桓滅之古城在西南龍山鎮相對史記齊世家作郯杜征南謂談在濟南平陵郯乃東海郯縣從春秋則當作談以桓公奔莒過郯郯莒相近則當作郯漢為東平陵縣右扶風有平陵故此加東文帝封齊悼王子辟光為濟南侯都此東晉時此城北石虎一夕移於城南有狼狐千餘隨之迹皆成蹊趙王石虎遂起南寇之計歷代皆為縣宇文周始廢隋亂土豪李蒲據城歸唐武德二年置談州平陵縣以蒲為總管貞觀中州縣相繼俱廢都督齊王祐反土人李君求房繼伯等據縣不從抗表以聞太宗嘉之敕曰齊州平陵百姓自隋末至今常懷忠誠不從冦亂宜加優奬以旌義烈縣依舊置改名全節其後廢入歷城此城漢為王都唐為州治故周二十餘里雉堞高峻三齊記以為殷帝乙之都按書序自契至湯八遷自湯至盤庚五遷並無都齊者况帝乙乃武乙之子紂之父也武乙帝乙皆居朝歌逮紂而亡豈在此地城西北有陰地數畝天色澄霽亦若雲陰迫視則無記謂青州有地鏡水影蓋亦此類平陵西北十五里有廢奉先縣城鮑城濟南東三十里鮑山下禹裔有鮑叔仕齊食采於鮑因以為氏鮑叔生叔牙進管仲於齊桓其後世為齊卿鮑城見三齊記山因城名遺山濟南行記作山誤也臺城濟南東北十三里漢高初封戴野為臺侯又有平臺城漢縣也在臺城北五十餘里俗曰故軍城營平城濟南東三十里漢縣宣帝封趙充國為營平侯隋唐皆置營城縣後廢入平陵餘見郡邑巨合城濟南東七十五里水經云巨合水南出雞山北經巨合城耿弇討張步進兵先脅巨里即此自宋為龍山鎮祝柯城濟南豐齊鎮東北二里周武王封黃帝之後于祝春秋祝柯齊邑漢為祝阿縣唐以縣南有廢禹息城改曰禹城禹城移理遷善村此即祝城也西北有野井亭郡國志云即齊侯唁公于野井高唐城見亭館陽丘城章丘東南十里漢縣文帝封齊悼王子安為陽丘侯後漢省至高齊乃以黃巾城立章丘縣寧戚城章丘東北三十里水經注楊緒水經寧戚城亦漢孝武封魯恭王子恬為寧陵侯之邑朝陽城章丘北二十五里漢初封華寄為朝陽侯高齊廢入章丘隋復置改曰臨濟唐屬齊州宋咸平四年復省入章丘以其地為臨濟鎮古城在鎮東杜預云西北有崔氏城丁公邑樂安城章丘臨濟鎮東北八十里地志以為漢千乘郡後更為樂安國乃在高苑此蓋漢元帝封匡衡侯國耳亭山城章丘西南六十里宋元嘉中於此置濟南縣屬頓丘隋開皇初改曰亭山唐元和中省入章丘菅城章丘臨濟鎮北記引晉太康志以管叔之後封於此齊滅管故其子孫仕齊愚按書稱致辟管叔古史謂管叔鮮罪大無後管夷吾出自周穆王至夷吾始顯豈管叔之後邪鄭州管城乃管叔所封魯有管邑大夫采地惟齊無管城此即漢之菅城而傳寫致誤鄒平故城鄒平西南二十里俗曰趙臺城唐武德初置縣於此後移理今縣城遂廢隋濟南城鄒平東北十五里隋開皇中於此置濟南縣大業初廢入長山梁鄒城鄒平東南三十五里漢梁鄒縣高齊天保間自長山界內濟南故城移平逺縣於此城隋開皇初自此移縣入鄒平豐齊城濟南豐齊鎮南漢茌縣唐天寶元年改為豐齊元和十五年廢入長清地産半夏極佳濟北城長清縣西三十里盧城長清縣南五十里隱三年齊鄭盟于石門尋盧之盟杜注云盧盟在春秋前莫知年代盧即齊地濟北盧縣故城是也舊州城北舊州城棣州南四十里唐棣州理此城五代梁刺史華溫琪以河水為害又南徙十餘里土人謂之南舊州城至宋大中祥符四年清河水復犯此城乃移州北置今理富平城陽信東南十餘里張安世子延夀徙封之邑亦名邵城西晉末邵續與段匹磾弟文鴦合兵攻石勒屯此城元帝以續為平原守後為石季龍所破陽信古城本縣西南七里俗呼城子務馬嶺城陽信東十里後魏移厭次理此大營城濵州西二十五里金人屯兵所築故丁河口金號鐡門關榷鹽務州北門外五代之際所置遺跡尚存鬲城德州西北古有鬲國漢縣鄃城音輸平原西南三十里漢縣屬清河後漢封馬武為鄃侯即今夏津縣重平城德平西北三十里漢渤海重平縣後魏大明間亦置高齊廢入平昌繹幕城平原西北二十里漢縣屬清河高齊省入平原般城鈎般河得名郭璞曰水曲如鈎流盤桓也漢縣高齊廢後為水毁厭次古城德州東北二十里本漢富平縣明帝更名厭次元魏時縣東徙馬嶺此其古城韓信營平原縣相傳信渡平原襲齊營於此亭館上益都宣聖廟府城西北隅有摹嶧山秦碑極精製旁刻云嶧山秦刻磨滅久矣宋初惟江南徐鉉有摹本贊皇李建中傳寫得之遺余曽祖金紫公傳子孫四世踰百年靖康建炎兵火相尋舊藏文籍散落殆盡獨此刻僅存命善工勒于青社郡舍阜昌甲寅河南李仲坦志下刻云盜發文篋褫去皇帝立國惟初六字不復敢補上下刻志五節不能備載石雖舋校鄒嶧摹本有間矣有崇寧經史閣碑州縣廟學不煩載有古今石則書龍興寺府城西北隅修身坊宋碑云寺即田文宅蓋本唐封演見聞記云青州南城佛寺舊傳孟嘗君宅有二大鑊造食供客大者容四十石小者容三十石李伾毁為兵器詳考圖志實非孟嘗君宅乃南史劉善明宅耳碑陰金人刻曰宋元嘉二年但呼佛堂北齊武平四年賜額南陽寺隋開皇元年改曰長樂又曰道藏則天天授二年改名大雲𤣥宗開元十八年始號龍興今寺內有飯客鼓架寺東淘米澗南史劉善明仕宋為北海太守元嘉中青州饑人相食善明家有積粟自作饘粥開倉賑救鄉里皆獲全濟百姓呼其家為續命田圖志相傳劉善明宅飯客鼓淘米澗皆當時事豈善明亦嘗事佛故在宋止呼佛堂後因捨以為寺且青州城晉羊穆之始築戰國時未有此城田文何故宅於曠野蓋後人止慕其名謂能飯客者必斯人而隱沒善明之高義不得不辨寺有北齊八分碑制刻精妙碑陰大刻四字曰龍興之寺蓋唐人續刻者寺後天宫院古老柏院也有石刻布衣張在詩云南鄰北舍牡丹開年少尋芳去又回惟有君家老柏樹春風來似不曽來旁刻云青州教授畢仲愈元豐六年至洛謁太尉文公公曰昔范諷補之好論詩嘗曰青州富庶地宜牡丹春時遊樂之盛不減洛陽古今人作詩者甚多而布衣張在一絶最為可愛補之為余誦之誠有意思皇祐中余為青守大書于西廡之壁今三十年矣子歸試往觀之仲愈還至老柏院其壁已壞因題于天宫院之石柱俾匠者刻之張生之詩既為四方所傳而詩之所自不可不知也故具書公語而刻于左城隍廟龍興寺東耆舊相傳金正大間益都有潘府尹者暮見城隍來謁曰公昔典漕枉殺二人今以相付即有二鬼相隨驅之不去逾年尹死今上清宫潘尹故宅也柱上猶有斫鬼刀痕事極可怪如近嵗濟南憲司有徐好古僉事由分司歸常鬱鬱不語一夕家人熟寐好古忽起抽刀先殺其妻又殺其長子婢媵死者數人惟幼子突窗間得逸徐乃自屠出腸而死竟不知其故其居宅後棄為照磨㕔事愚到官始毁之而建架閣庫焉此事衆所目擊四方共聞潘尹事亦不誣矣慮刑者可不戒哉廟亦隨郡皆有亦不煩載餘如東嶽行祠府君三陵諸祠皆然普照寺府東北隅美政坊古名皇化寺僞齊劉豫改名普照相傳南燕主慕容行宫金大定碑刻存焉寺後東陽陵慕容德虛葬之冢近嵗始為人所平太虛宫普照寺南初金季有全真道士丘長春自棲霞西入關過益都知府事徐君館之長春相其宅曰此福地也徐即施與之遂卜築焉井鹵不食使弟子詛茶投之即成甘泉海岱樓府城內其西宣慰司公署皆金統軍司衙也金人有榮鎮中和二堂范公亭府西門外文正公知青州有惠政洋溪側出醴泉公搆亭泉上民感公德皆以范公目之燕談云環泉古木蒙密塵迹不到去㕓市數百步如在深山中幽人逋客往往琴詩試茗於其間真如物外之遊也最為營丘佳處歐陽文忠公劉貢父張禹功蘇唐卿諸賢多賦詩刻石置亭中其後金人亦有醴泉碑兵後俱亡表海亭府城北南洋橋北惟古臺存焉取左傳世胙太公以表東海為名不知創於何代自歐陽文忠公知青州已有詩近代任君謨詩有石刻兵後不存有録之者並載於後富相亭府南瀑水澗側富文忠公知青州所建歐公游石子澗詩謂富相公創亭後人又建冰廉堂皆廢微醉翁筆先賢遺跡殆將氓焉武成王廟府北舊城內有宋大中祥符元年真宗御贊碑存焉碑亭舊城北世祖皇帝平李璮後賑恤青人民立聖德碑翰林閻復子靜文國王廟舊城北王名穆呼哩招降李全有德於青人故立廟郭大夫廟齊記補曰劉裕既平廣固城齊人郭大夫相水土勸羊穆之築東陽城為青州後人為大夫立廟于雲門山前或云益都城在山陰其雲門劈山皆始城者疏鑿以宣風氣審爾豈大夫所為乎府東五十里洱水東岸有郭朴墓碑土人以為即大夫之塋也三元閣舊府城內冦萊公典郡日所建今廢羅漢洞府西山中疑即齊記補所載七級禪寺常將軍廟臨朐穆陵關上齊記補曰將軍秦昭宣帝時為大峴戍主建元中戰殁後人立廟此山皆石為之按通鑑晉孝武太元九年謝𤣥乘秦亂遣兵攻青州降之時符堅建元二十年也將軍蓋與𤣥戰死唐沈亞之沂水雜記又云沂水北一百里有將軍峴甚靈民置祠路左將軍曽為五郡牧姓常名𤣥通因築城失主將意斬之其尸數日不仆有臺曰立尸臺臺西南曰鞍山山北有關曰穆陵關李師古不臣作鎮于此元和初罷之南有沂山山有廟即東安公也沂州刺史每春月禱于是山山有谷九十九所河分八大曰沂曰汶汶東注濰沂南流入清沂山東南有山曰太平山頂平可八九十里頃嵗有冦曽居之山北十餘里有樹五壇此亞之記所說常將軍事跡與齊記補不同而齊記補近是今兩存之五壇者劉裕伐南燕兵過大峴而喜曰兵已過險士有必死之志餘糧棲畝人無匱乏之憂彼已入吾掌中矣遂設祭天五壇遺址尚存冶官祠臨朐南冶原酈道元曰熏冶水出西溪溪上有冶官祠廣雅云金神謂之清明蓋古冶官故取稱焉水色澄清特異中有古壇邃岸凌空疏木交合先公太和中作鎮海岱余總角之年侍節東州此實栖游勝地澠水燕談曰青之南有冶原昔歐冶子鑄劔之地山竒水清旁無人烟叢城古木氣象幽絶富韓公之鎮青也聞劉孟節先生纍官不起欲隱此地乃為築室泉上為詩以贈曰先生已歸隱山東人物空古碑猶存而境物因人之勝則蕩然矣阿育王塔臨淄城西高僧傳石虎於臨漳修治舊塔少承露盤佛圖澄曰臨淄阿育王塔地中有佛像承露盤虎掘得之齊記補云唐太和中建寺五代無棣僧道圓居之與宋太祖有舊加號蓋國大師增塔為十二級祥符中更名廣化寺又載黃康弼詩云齊野非吳渚支郎是子陵釣臺千古月寶塔萬年燈又臨淄東南天齊淵側有石佛三尊各長丈有八尺不知年代古天齊觀臨淄城內金大定間道士楊善淵卜此地建三清觀掘得古磚志云大齊丙戌二年南郭石羊巷楊道圓施花磚三千在天齊觀因知此地高齊時天齊觀故基也今南郭石羊猶存吕仙翁祠博興城內祠即韓氏酒罏仙翁嘗飲于此書屋壁云吕嵓獨酌洞濵宣和壬寅六月書凡十三字後盜焚民居殆盡惟韓氏室完土人因名為辟火符靖康間邑人乃於社稷壇碑陰模勒仙書立於祠前社稷碑亦宣和間物圖志考訂極為精妙可為後法愚按仙翁游人間多稱回道人如沈東老詩類是也惟此顯書姓名賔字復加水豈以辟火而然邪州北三十里居民張氏家亦有祠搗衣石上隱然飛劔形影錦秋亭博興東南城上中統間邑人所建取坡詩命名蓋齊地菑時般濼衆水瀦為馬車瀆以入海博興宛在水中舟楫交通魚稻成市昔常過之愛其風水絶類江南賦詩亭上云霜風收緑錦萬頃水雲秋海氣朝成市山光晚對樓舟車通北闕圖畫入南州且食鱸魚美吾盟在白鷗其鱸雖小亦四腮不減松江有蓴菜齊人皆不識目鱸為豸魚云孔北海祠濰州公署後北城上宋政和四年太守安陽韓公建又有論古堂亦韓所搆今皆廢論古堂碑略云學術如逢紛庸談郎宗鄭康成甄宇徐房徐幹孝友如淳于恭王裒王閭吕元蕳節義如禽慶王修杜公贇正直如羊融周澤王義是儀韓載操尚如公沙穆邴原王昕隱德如逢萌管寧知人如郎顗高構高義如孫嵩劉敏元政事如滕撫張允濟皆足以振揚英聲扶持風教接邦人于道裒其像而繪之名其堂曰論古掖縣簿劉杲卿文與祠堂碑金人修城記三碑並立於城上州署扁曰靖恭亦有政和石記存焉玉清宫濰州城北丘長春弟子尹清和建長春在漠北還書誡清和曰勿化小末人出家蓋道非薄質可受亦名言也書有石刻存焉寒亭濰州東二十五里夏諸侯寒伯明之國寒浞者伯明之讒子也伯明棄之有窮后羿收之以為己相浞遂殺羿因羿室生澆及豷使澆殺斟灌以伐斟尋滅夏后相后緡逃歸有仍生少康焉有田一成有衆一旅能布德兆謀以收夏衆卒滅寒浞復禹之績此寒國也自古圖志皆載寒亭而俚俗之談極陋以齊無志書故也斟亭通志云濰州東南五十里古斟尋國漢北海郡亦有斟縣京相璠曰斟尋去斟亭七里杜征南云夀光縣東南亦有灌亭今按惟夀光之灌亭濰州之寒亭在焉餘皆廢蓋古人圖志詳明故國廢城皆立亭以為表志後世蕩析不存為可惜也信公祠澠水燕談云蕭榔字大珍後梁宗室為青州刺史有惠愛篤信於民及死民為立祠千乘縣西諡曰信公嘉祐中祠廢重修今有信家莊蓋公堂密州城內東坡建記以醫為喻意在介甫比聞為勢家所奪碑記恐不存矣欽按曹參百戰餘勇宜其剛鋭自視無前及為齊相乃能賔師蓋公以清靜化民稱為賢相後世武夫健將能若是乎此古人所以不可及也超然臺密州北城上坡記曰城之北因城以為臺舊矣稍葺而新之余弟子由適在濟南聞而賦之且名其臺曰超然石刻具存城陽景王廟莒州城內祀漢朱虛侯劉章章齊悼惠王子誅呂有功文帝封為城陽王漢時惟高廟有神靈王莽畏而毁之城陽廟亦靈異琅邪王京遷都避去赤眉軍中猶鼓舞之蓋其英烈之氣有乃祖之風廟久廢州署內有古槐半體如枯槎而根葉敷茂相傳是章手植益都舊城北南陽水上古亦有廟遺址尚存馬𡺸山神祠莒州南馬𡺸山宋政和四年敕額惠感廟夷吾亭蒙陰西北堂阜鮑叔解管仲縛於此今名憚阜音轉也庸生廟膠州城西門外冢在廟旁而地記又云庸生宅在掖縣非是石臼島龍祠膠州海邊宋紹興三十一年封右順侯賜威濟廟後金主南侵遣舟師由海道趍兩浙宋將李寶遇於膠西海口禱于神祠得風助順遂殪金師故加封靜治堂沂州公署後堂宋人建有元祐六年新創蓮花漏碑云刻漏之法莫如燕公潼川之制訪求得之於營丘之白門蓋歐陽文忠公因燕公之舊而新之者又參取翰林蘇公子瞻所為彭門記者而制焉靜治堂後舊有香林館思賢堂雨聲軒三休亭平野亭惟靜治平野三休在焉至元初碑云宋時郡治堂宇壯麗耆舊猶能道之兵後焚毁無遺僅存而可考者惟金防禦使鄭景純一碑而已景純有南柯子十愛詞石刻王黃華兩聲軒碑亦存普照寺沂州城西金皇統四年仲汝尚碑云當子城西南有古臺臺西有廢池耆舊相傳臺曰曬書池曰澤筆東晉王右軍故宅也往嵗得斷碑于土中謂招提復興于後魏唐賜額開元宋崇寧初詔改為天寧萬夀禪寺逮廢齊居攝専用苛政理國知衆不附尤狹中多忌凡浮屠老子之居一切廢革遂易天寧為普照云按寰宇記此名永嘉臺琅邪王睿所築與此不同記又云沂州東北三十八里故臨沂城南有王導故宅亦無跡可考栁毅廟沂州艾山宋元豐二年封靈鎮侯政和五年賜額昭應酺神廟艾山東厚丘城側周禮族長祭酺酺災害神主生蝝螟故祭之因合衆飲酒後世遂有酺賜蒼山廟沂州南蒼山宋元豐三年封豐德侯政和六年賜額靈豐昭濟王廟費縣蒙山神宗熙寧八年賜額靈顯廟封潛應侯元祐七年進封公大觀二年封昭濟王政和五年封昭濟惠民王顔魯公祠費縣東門外宋職方員外郎曹輔碑云公有廟在費東五十里諸滿村元祐六年楊元永為邑建新廟于此定海主簿祕書省校對黃本書籍秦觀書丹碑陰復刻米芾書云公之使賊也謂餞者曰吾昔江南遇道士陶八八得刀圭碧霞餌之自此不衰嘗云七十後有大厄當會我于羅浮山此行幾是後公死于賊歸葬偃師北山有賈人至羅浮山觀道士奕託書至偃師北小顔家及往訪之則塋地守冢蒼頭識公書大驚家人卜日開壙棺已空矣元祐二年九月余遊吳興適覩邦人新公之祠因得謁拜公像嘗閲洛中紀異載公前事刻于碑陰以貽續仙傳者云又王仁裕玉堂閒話載公遭難後十餘年家僕於洛京見公衣白衫張蓋歸城隅萊園有破屋數間僕隨入拜之公出懷中金十兩以寄其家戒僕勿與人言公之子亟至但見滿目榛蕪而已時人皆云魯公尸解得道然此或即一事而記有異同公英烈之氣在天地間非仙即神則無足疑者二疏宅嶧州東四十里羅滕城墓亦在焉城周五六里土人指以為宅按二疏歸鄉里顧有舊田盧娛樂終身不為子孫增益産業寧有如是之宅乎即城內古寺其故基也海州有景疏樓絃歌堂滕州公署後子游之武城近在州東故取名宋人有鄒堂以山谷鄒􅋵取名又有公堂見坡記今並廢性善書院滕州城內伏羲廟滕州染山愚按顓㬰風姓實司太皡之祀鄒魯有廟是也伏羲都陳謂州東鳬山有墓則非也陶朱公廟滕州陶山按陶本作桃即古之華菜山也後人因陶之訛遂以祠陶朱趙盾祠滕州高山唐元和志盾祠在絳州太平縣宋會要在府州府谷縣皆晉地今此有祠何也且宣子固晉之賢大夫董狐以其亡不出境還不討賊為法受惡書曰弒君孔子韙之所以戒萬世亂臣賊子之黨也後世乃廟而祀之賊黨何所懼乎盾祠當毁又寰宇記長青縣東北有盾墓亦後人附會自宋有天下譜系趙孤祠墓之衍蓋由此也子思書院鄒縣城內鄒國公廟鄒縣城內地名因利溝謂即孟子故宅宋元豐五年封政和五年詔孟子廟以樂正子配享公孫丑以下從祀其封爵樂正子克利國侯公孫丑夀光伯萬章博興伯浩生不害東阿伯孟仲子新泰伯陳臻萊伯充虞路樂昌伯屋廬連奉符伯徐辟仙源伯陳代沂水伯彭更雷澤伯公都子平陰伯咸丘蒙須城伯高子泗水伯桃應膠水伯盆成括萊陽伯季孫豐城伯子叔承陽伯靈貺廟鄒縣嶧山神祠宋大中祥符元年封靈岩侯崇寧四年賜額齊乘卷四
