body:
  text: 齊乗卷五元于欽撰亭館下開元寺般陽城内通志唐李邕書開元寺碑在淄州今寺内無邕碑而晉人小楷樂毅論石刻在焉蓋淄川東有樂毅廟東十八里地名樂店石移寺中子昂公嘗屬余打數本每以印手不高為恨土人亦不知為貴懷范樓長山縣金人所建有泰和碑刻范公祠長山縣宋治平二年尚書祠部員外郎知長山縣事韓澤建李勣廟般陽北二十五里東海淵聖廣徳王廟萊州西北二十里漢以來古廟宋開寶六年敕建㕘知政事賈黄中碑四知廟萊州東門内祀漢東萊太守楊震無訟堂萊州公署後宋政和間建劉將軍廟萊州城内晉東萊太守有徳於萊人故祀之幸臺萊州城内相傳漢武帝東游訪安期生所築有碑字滅不可攷燕臺萊州城北慕容徳以掖為青州築此臺觀六龍灣龍祠萊州北前有輪井石口如車輪號曰天井能興雲雨金泰和間禱澍有感碑記存焉三山亭萊州城北東坡有詩僊臺膠水縣東北五十里青山下列仙傳公沙宿飲白鶴泉得仙嘗止此臺之上臺極峻絶今不可登游仙宫萊陽縣南馬丹陽得道之地賔日樓登州公署後東坡志林云東坡居士移守文登五日而去眷戀山海之勝與同僚飲酒賔日樓酒酣作木石一紙投筆而歎自謂此來之絶河内史全叔取而藏之樓側舊有納川亭東有頌徳堂蓬萊閣登州北三里海濵田横寨相對本海神廟基宋治平中郡守朱處約以其地太高峻移廟西置平地於此建閣實為山海登臨勝㮣閣下有獅子洞洞前有泠然泉古稱浪井潮生浪起則没水退則甘洌如故舊有甘泉亭閣下碎石為海浪淘激嵗久圓滑土人謂之彈子渦黒白者可以奕坡公嘗以數百枚養石菖蒲作詩遺垂慈堂老閣上古今題詠甚多而宋人秦樓月一詞頗飄逸詞云烟漠漠水天摇蕩蓬萊閣蓬萊閣朱甍碧瓦半浸寥廓三山謾有長生藥茫茫雲海風濤惡風濤惡仙槎不見暮沙潮落登人皆歌之濵都觀棲霞縣北五里邱長春祖宫遺山云邱赴龍庭之召億兆之命懸於好生惡殺之一言誠有之則雖馮瀛王之對遼主不是過自是黄冠之人十分天下之二予有感焉清真觀記秦宫寧海州文登縣東北百八十里古老相傳始皇所築東南臨海縣有七井後人因立祖龍廟朝陽亭文登縣宋慶厯間建舜廟濟南府城第二坊按圖經古舜祠在廟山舜井在此今廟在井傍有宋碑城外古舜坊即廟山故道娥英廟趵突泉側祀娥皇女英今廢宣聖廟憲府東大明湖上有宋崇寧賜辟雍詔大觀御製政和手詔三碑在焉厯下亭府城驛邸内厯山臺上面山背湖實為勝絶少陵有陪李北海宴厯下亭詩鵲山亭城北鵲山湖上少陵詩序登厯下員外新亭亭對鵲山湖者是也今廢北渚亭水經注濼水北為大明湖西有大明寺水成淨池池上有亭即北渚也池今名五龍潭潭上五龍廟亭則廢矣湖上舊有水西亭環波亭並見南豐子由諸賢詩今廢仁風㕔舊府治即今憲司前衙也其後靜化堂禹功堂芙蓉堂名士軒竹齋凝香齋水香亭采香亭芍藥㕔並見蘇曽諸公詩今即後堂有宋元祐名士軒碑㕔西古竹猶存芍藥尚餘數本厯山堂濼源堂舊在趵突泉上北堂曰厯山南堂曰濼源南豐知齊州日建此以館客有齊州二堂記城内又有閲武堂亦見公詩又有望湖樓李師中所建皆廢泉西金人建勝㮣樓亦壯麗近亦為水所壞百花橋今曰鵲華大明湖南岸橋南百花洲洲上百花臺環湖有七橋曰芙蓉曰水西曰湖西曰北池之類是也南豐詩云莫問臺前花逺近試看何似武陵游又云從此七橋風與月夢魂長到木蘭舟㮣可想見今皆廢矣惟百花橋與濼源石橋僅存濼源橋在城西子由作記欽按濟南東藩名郡自唐李北海杜子美宋曽南豐東坡兄弟相與登臨歌詠於湖山之上當時政治風流猶可想見而亭館隳廢百無一二今人亦那復知之方且戚戚於矯飾汲汲於資級以此馳騖一世反有竊笑古人者矣酈食其廟府城内今廢章邱臨濟鎮南有酈商冢者即食其冢也食其為田廣所烹故齊有墓弟商不應葬此開元寺府城内建於唐祐徳觀府城内唐碑云瑞氣觀宋曰天慶今改祐徳觀内古有扁鵲祠金人因創神農廟碑記存焉靈巖寺府南八十里靈巖山中其山與方山相連南接泰山北帶龍洞極為深秀疑即水經之玉符山也寺乃佛圖澄卓錫之地有立鶴泉佛日巖辟支㙮自山麓至寺門十餘里古松㕘天亦謂之十里松厯代碑志具存天齊山廟府城内按漢志濟南國治東平陵有天山郡南山也以其在齊因曰天齊山猶臨淄淵曰天齊淵者是也俚俗乃云山高與天齊不經甚矣高唐亭濟南豐齊北古高唐地有此亭謝恩臺棣州北亡金賑饑所立有金碑廉頗相如祠棣州陽信縣李牧祠陽信縣按趙將相有祠在此豈西北界趙廉藺亦嘗與齊戰齊人慕其賢而祀之云有墓者非是秦臺濵州東十三里高八丈周二百步相傳秦始皇東游縈蒲繫馬之處亦名蒲臺般陽之蒲臺縣以此氏焉真祐廟濵州城内祀齊客茅焦兄弟宋大觀三年賜額真祐廟政和六年兄封允濟侯弟彊濟侯金末祠廢土人呼為茅神臺段子明祠子明齊將有墓在蒲臺宋元符三年賜額善應廟建中靖國元年封善應侯俗云段干木者非是徳風堂徳州公署舊堂鬲津堂舊在徳州顔魯公廟徳州城内燬于兵至元二十三年即故基重建管輅祠平原城内唐明宗廟五代唐莊宗拔徳州以李嗣源守之莊宗敗嗣源入大梁是為明宗民號其屯兵之地為明靈寨即今清平縣也立廟祀焉龍泉寺平隂東南四十里齊天統中建下寺有石刻劉豫阜昌三年皇子皇弟符改甲乙院亦有碑又阜昌中題名最多佛像古雅皆數百年物上方大佛與龍泉觀音非晩唐人不能造丘壠蘇秦冢益都府東二十五里秦自燕奔齊齊大夫與秦爭寵使人刺秦不死殊而走齊王求賊不得秦謂齊王曰臣即死車裂臣以徇于市曰蘇秦為燕作亂于齊如此賊必得矣齊王如其言殺秦者果出王因而誅之秦死猶詐也裂其軀而不恤哀哉般陽西又有秦冢與此為二豈葬而復詐乎嘗論戰國之士以詐功耀天下者秦儀也秦洛陽人儀魏人乃曰齊人多詐置二子於何地乎營邱臨淄西二里㙮寺後爾雅云水出其左曰營邱淄縈其東南故以名也晏子曰先君太公築營之邱謂太公築邑此地通志云營邱即今臨淄縣或云在濰州昌樂其地本顓帝之墟爽鳩始居其後季萴伯陵因之太公又因之按顓帝都于濮陽少昊時爽鳩已居營邱又為顓帝之墟何邪在昌樂者乃營陵城元魏誤以為營邱而縣焉營邱之上自唐長慶間立太公桓公廟今惟宋景祐三年碑存桓公祠墓臨淄東南十里水經注云女水西有桓公冢甚高大一墓二墳晏謨曰依陵記非葬禮如承世故與其母同墓而異墳伏琛所不詳也冢東女水原有桓公祠侍其衡奏魏武帝所立衡曰近日路次齊郊瞻望桓公墳壠在南山之阿請為立祀為塊然之主然則俗謂二王冢又云公與女之冢皆非也唐貞觀十年太宗詔禁樵採三士冢臨淄南一里一基三墳諸葛武侯梁父吟步出齊城門遥望蕩隂里里中有三墳纍纍正相似借問誰家墳田疆古冶子力能排南山又能絶地紀一朝被讒言二桃殺三士誰能為此謀相國齊晏子注引晏子春秋曰公孫捷田開疆古冶子事景公勇而無禮晏子言於公餽之二桃令三子計功而食公孫捷曰吾一搏特猸再搏乳虎功可以食援桃而起田開疆曰吾仗兵而郤三軍者再功可以食援桃而起古冶子曰冶嘗從君濟河黿銜左驂冶潛行水底逆流百步順流九里得黿而殺之左操馬尾右挈黿頭躍而出功可以食二子曰吾勇不若子功不逮子取桃不讓是貪也然而不死是無勇也刎頸而死冶曰二子死之冶獨不逮又刎頸而死或曰晏嬰賢相豈有殺士之名蓋曹操既殺孔融楊脩又送禰衡荆州假手黄祖三子者天下之望也武侯梁父吟殆為此設然則晏子春秋反因梁父吟而附會如山海經之於天問耳田和冢府北二十里普通店和為田齊之太公皇覽作太公吕尚冢按檀弓云太公封于營邱比及五世皆反葬于周此不應有冢皇覽最叵信如云濟南厯山上有太甲冢皆此𩔖東南者謂是齊胡公冢胡公獻公父亦反葬于周五公冢臨淄東南十里齊昭公靈公惠公頃公孝公五墳相近高敬仲墓臨淄東北二十里又名白兔冢左傳莊九年鮑叔曰管夷吾治於高傒即敬仲也杞梁冢臨淄東三里齊莊公襲莒杞梁死焉其妻迎其柩而哭之詳見檀弓左傳黔敖冢臨淄東九里齊饑黔敖設食於路以待餓者蒯徹墓臨淄東二里漢書徹范陽人高祖曰徹齊辨士故卒葬此胡氏管見曰韓信功齒三傑不可忘也迎陳之禮可贖自王之釁拒徹之意可免失期之罪未有反計則當侯以次國逆謀既露猶當宥其子孫愚謂韓信失職怨望者有之逆謀既露則無也以信之智料事成敗審矣背水之陣計曰信非得素撫循士大夫也所謂驅市人而戰非置之死地則走耳寧得用乎夫以大將握兵猶臂使指尚慮及此失職之後乃謀詐赦諸官徒奴欲以集事此鼠竊之慮耳連百萬之衆據三齊之勝制天下之權武涉蒯徹游說百端利害切至尚不肯變乃與陳豨挈手步庭令豨舉兵吾徒中起天下可圖此又臧獲之見也信謀果爾何前智而後愚哉信非蕭何不留及其失職怨何必深何嗾吕后殺信遂誣信反千載之下尚不覺悟信其寃哉逢萌冢郡志在濰州營陵古城中記在益都縣云高士冢葵邱臨淄西三十里古齊邑左傳莊八年齊侯使連稱管至父戍葵邱𤓰時而往及𤓰而代杜注在臨淄即此地齊桓公葵邱之會則在陳留管仲墓臨淄東南二十三里晏子墓臨淄古城北三里唐貞觀中禁十五步内不得樵採高密平原又各有墓與此為三欽按晉載記曰慕容徳登營邱望晏嬰冢顧謂左右曰禮大夫不逼城而葬平仲古之賢人達禮者也而生居近市死葬近城豈有意乎青州秀才晏謨對曰孔子稱臣先人之賢豈不知高其梁豐其禮蓋政在家門故儉以矯世存居湫隘卒豈擇地而葬乎所以不逺門者冀悟平生意也以謨考之臨淄墓為真辟閭渾墓壽光西南三十里俗呼釣魚臺渾晉幽州刺史慕容徳陷廣固殺之渾子道秀詣徳請與父俱死徳曰孝子特原之臧臺壽光西四十里舊有宋碑云是臧武仲之墓愚按左傳襄公二十三年臧紇致防而奔齊至昭公十年平子伐莒取郠獻俘始用人于亳社臧武仲在齊聞之曰周公其不饗魯祭乎是時武仲客齊已十八年其終不歸魯而卒葬于齊乎又西五里有馬陵臺水經注云不知是誰之冢世謂馬陵臺熙熙臺壽光北城上蓋取老子衆人熙熙如登春臺立名不知剏於何代鳯凰臺壽光西北三十里宋天聖間鳯凰下此因築臺有宋碑北有南皮臺前有東岳南岳行祠金永安二年碑刻在焉疑即古平望亭也平望亦漢縣見伏琛齊記蒼頡臺壽光西北洱水所經水經注謂孔子問經石室非也通志云蒼頡石室記二十八字在蒼頡北海墓中土人呼為藏書室周時自無人識逮秦李斯始識八字曰上天作命皇辟迭王漢叔孫識十三字豈孔子至齊亦嘗訪焉故有問經之目過宋臺壽光南二十五里官臺壽光北七十里有鹽官壽光古有灌亭豈灌轉為官亭廢為臺邪俗謂縣周回有十臺九城信然如熙熙過宋官臺之𩔖皆不可攷任光冢樂安城西二里俗𫝊任光冢按光南陽宛人更始初為信都太守從光武破王郎封阿陵侯卒子隗嗣隗仕至司空又傳三世至孫世徙封北鄉侯北鄉始為齊地自北鄉上官封無至齊者光何緣有墓在此豈北鄉侯冢邪貝邱博興南五里左傳齊侯田于貝邱見彘射之彘人立而啼乃公子彭生也即此地亦曰貝中聚董永墓博興南三十五里世説永東漢人鬻身以葬親般陽長山南又有冢廟皆出野語青邱樂安北清水泊蓋以青邱得名齊景公有馬千駟田于青邱與晏子游于少海皆此地少海謂渤海也伯氏冢臨朐古駢邑伯氏所食後為管仲所奪伯氏没齒無怨言故城西有其冢路史齊遷莒郱鄑郚郱本紀邑故城在臨朐東南麓臺濰州西孤山之麓一小阜下名麓臺村寰宇記云州西二十里高二丈三尺是𢎞墓也墓後有泉號曰補生泉九域志云公孫𢎞讀書處王裒墓濰州南三十里徐幹墓濰州東五十里俗呼為博士冢幹建安七子魏志云北海劇人卒葬此伯牛阜昌邑西北十里又東子騫阜古有閔子祠今名三阜南有子游祠竝見寰宇記今曰蓮花陂三阜者蓋亦三賢之意但未詳所始逢丑文墳昌邑南五里記謂丑文食邑都昌故墳在此然則般陽逢陵非其邑也渠邱密州安邱自漢有渠邱亭周武王封少昊之裔兹輿於莒初都計春秋時遷莒至莒子朱居渠邱成八年晉使申公巫臣如吳假道于莒與渠邱公立於池上柴阜密州安邱西五十里邴原之墓在焉慈阜柴阜之東齊記云營陵南今濰州昌樂四十里有慈阜魏奉常王脩葬此俗以脩至孝故此邱以慈表稱脩母以社日亡每社設祭悲泣鄰里為之罷社管寧墓柴阜東十餘里蓋與原墓相近王章墓寰宇記云安邱縣西南四十里通志金石略云章碑在密州章仕至京兆尹日蝕上封事劾大將軍王鳯為鳯所陷下獄死初章為諸生學長安病臥牛衣中泣與妻訣妻怒曰朝廷尊貴誰如仲卿者病困不自激昂涕泣何也後章至京兆尹上封事妻又止之曰人當知足獨不念牛衣中涕泣時邪章不聽果死獄中妻子徙合浦鳯死始得還其妻亦賢矣哉因表而出之然章泰山鉅平人何緣葬此惜其碑㫁毁不可考也孫嵩墓安邱南四十里欽嘗寓宿太虛宫夢有趙先生者入謁謂欽曰聞君脩齊志僕有良友葬安邱其人節義高天下今世所無也請載之以勵衰俗欽覺而語梅仲昇以為鄉人趙伯善共訪之伯善愕然及閲趙岐傳始悟為孫賔石也嗚呼邠卿處複壁中著書以名世固奇士非賔石之高義則志弗克伸矣偉哉若人尤奇者斯夢也故識之康成祠墓膠州高密縣西北五十里劉宗山下山産磨石古礪阜也水經亦謂之碑産山高士傳云袁紹屯官渡逼𤣥隨軍不得已載病至元城率葬於劇東後因墓壞歸葬礪阜墓前有廟廟之南有唐開元碑縣西有鄭公鄉孔北海告高密縣所立者劇東舊葬地即今益都府東五十里鄭墓店是也因高密有鄭公鄉土人訛為鄭母云古冢郡國志云即墨城北有古冢或發之有黄牛從埏門出犯之即吼不可動又云縣有徐誕弟子夏侯臯墓臯死後有人遇臯以手巾寄信與誕乃棺中物也雙女冢膠州計斤城南耆舊相傳宋靖康間臨海王氏姊妹與姑避難為敵所得王氏謂曰汝放姑還者當從汝也敵縱姑去王氏姊妹罵曰我閥閲家豈為汝汙即投海而死居人得其屍而葬焉此與唐奉天竇氏二女無異惜乎不得其家世之詳曹嵩墓沂水縣南百二十里嵩操之父也避難琅邪操使迎之輜重百餘兩陶謙别將張闓襲殺嵩於華費間取其財物因奔淮南操引兵攻謙拔十餘城阬殺男女十餘萬口雞犬亦盡吁嵩居亂負乗操復讎濫殺闓貪財煽禍一事而作戒數端此之謂也王祥墓沂州北二十五里墓西戚溝湖孝感泉剖冰躍鯉之地傳云求忠臣於孝子之門祥至孝晩乃失節事晉郝陵川續後漢書列之簒臣惜哉余故表而出之為昏耄持禄者之戒鯀墓沂州東南百里羽山之下奚公冢滕州東南青邱村奚山下古奚邑韋賢墓鄒縣嶧山之陽石表大刻曰漢丞相韋賢墓左邱明嶧州東北七十里元和志東平平隂縣東南復有邱明墓王肅墓嶧州東南二十五里劉靈墓嶧州東北二十里已上並見寰宇記靈墓所今名劉曜村淳于髠墓般陽東六十七里史記蔡相冢萊州膠水西北金尚書右丞相蔡松年墓也松年自號蕭閑老人子珪亦好學博古第進士仕至禮部郎中出守濰州卒縣南復有蔡邕冢伯喈陳留圉人未嘗厯齊豈亦松年族人之墓遥祖伯喈邪閔子祠墓濟南府城東門外五里宋熙寧七年濟南太守李肅之即墓前置祠立碑蘇子由作記東坡書又濰州昌邑西北子騫阜上古亦有廟濮州范縣又云有墓未詳陽貨墓章邱西北十里高丈餘貨嘗奔齊又適晉趙未知死葬何地云此有墓未詳房彦謙墓章邱西南三十里唐刺史追封臨淄公𤣥齡父也墓有碑李百藥文歐率更書極精近聞村人以打碑之擾毁仆之良可歎已鄒衍墓章邱東十里燕軍冢長清縣南十五里寰宇記云謂是燕昭王者後人誤也恐是燕軍之冢耳班超冢寰宇記云在長清東北二十五里定逺扶風平陵人以和帝永元十四年八月徵還洛陽九月卒齊地曷為有墓豈以齊有東平陵而附會之邪赫胥氏墓章邱臨濟鎮東故朝陽城内劉豫墓濟南城西鵲山下墓中産蝎按宇文懋昭劉豫録云豫景州阜城人宋元符中登第累官至殿中侍御史被劾出為兩浙察訪至真州丁父憂居焉金兵陷河南高宗過維揚起復豫知濟南豫到郡金人利誘之百姓遮豫願以死守豫竟出降金人徙豫知東平節制河南兵馬及張邦昌廢豫使子麟以重賂結尼堪及其腹心高慶裔輩求僭號尼堪假以百姓推戴請于金主立豫為帝國號大齊改元阜昌初據東平繼遷于汴僉發鄉兵三十餘萬付子麟姪猊領之分道冦宋大敗而歸豫猶請戰不已金主下詔廢為蜀王父子竝徙上京豫僭位凡八年至上京改封曹王而死初豫僭立有醉民罵豫曰你是何人要作官家大宋何負於你進士邢希載等亦勸豫歸宋豫皆殺之豫父子嚴刑暴歛取快一時見兵士賣陵中玉椀即置淘沙官再發河南山陵及發民間無主墳墓行五等稅法民鬻子者皆税百錢下至倡優日有納課臣下納女獻妻者皆得遷官貰罪去汴之日金帛糧斛山積父子姬妾各百餘人食淫不道有如此者金皇統間沂州普照寺碑亦謂豫専以苛政理國知衆不附尤狹中多忌者足證其㬥云或問欽曰契丹入汴梁而民驚散金人入中原而民恐懼其勢一也契丹則以南帝啗趙延壽父子而終不肯立金人則始帝張邦昌又帝劉豫何也應之曰嘗聞蕭太后責延壽父徳鈞曰汝為人臣既負其主不能却敵又欲乗亂徼利所為如此何面目以求生其論甚正抑知帝王大器須英雄之人始克負荷豈叛降之人所能堪邪金人則不然乗高宗之懦且脅且和計議百出遂立劉豫為帝矣至如劉豫直以賂結權貴而得立其為卑猥又邦昌之所羞使高宗若稍有雄才擒之如獵狐兔元遺山取豫而黜石勒不知其何說也豫嘗游平隂龍泉寺有留題來者訕笑遺山復為解嘲云河邊羖䍽尚能飛無角無鱗自一齊甲子紛紛等兒戲壁間休笑阜昌題然則豫在當時自有定論遺山何故曲為之說黨惡如此豈不為㫁腕后所笑邪自古經生文士學博才高而性癖識陋害理者不少如遺山之流可不戒哉婁敬祠墓徳州徳平東南二十里祠在墓側五代周顯徳間建膠州復有奉春墓未詳東方朔祠墓徳州東四十里古厭次城北祠在墓南宋元符間封智辨侯顔魯公守平原書先生畫賛立碑祠下今碑移州署内州陽信縣古邵城又云有墓益都壽光縣東方村又有廟先儒謂非高祖用子房乃子房用高祖欽亦謂曼倩非漢武所得御曼倩以智御漢武耳比子房赤松之遊其迹尤晦漢延爵禄惟此輩人不為所縻嗚呼高哉欽嘗過其廟有詩云甲乙不焚珠壁帳百錢囊粟且婆娑殿前怒擗黄金㦸天上偷將紫玉珂班固有評真率爾子雲禄隠果如何漢初除却椎秦手只許先生逸網羅張騫墓平原縣東北騫嘗窮河源平原河所經因附會耳風土唐虞三代風化尚矣春秋以降列國殊俗去古未逺自秦漢以後千八百年總天下風俗五變愈下蓋自漢至西晉一變五胡南北至陳隋一變隋唐至安史之亂一變五代一變宋金之交又一變安史滅君臣之義未盡至五代則㡬矣五胡南北之路未㫁迨宋時則絶矣是皆關天地之大運非若春秋戰國異政殊俗専可以人事論也故今天下四海九州特山川所隔有聲音之殊土地所生有飲食之異小小習尚不同謂之土俗可也其大好惡大趣向則系乎一氣之運一代之治不得以異俗書也然自漢史以來代存列郡之俗亦不得不攷古以驗今至於土産亦略具前式以相證云前漢地理志曰齊地虛危之分野也東有淄川東萊琅邪高密膠東南有泰山城陽北有千乗清河以南渤海之高樂高城重合陽信西有濟南平原皆齊分也少昊之世有爽鳩氏虞夏時有季萴湯時有逢公柏陵殷末有薄姑氏皆為諸侯國此地至周成王時薄姑氏與四國共作亂成王滅之封師尚父是為太公詩風齊國是也臨淄名營邱故齊詩曰子之營兮師古曰毛詩作還齊詩作營遭我乎嶩之間兮又曰竢我於著乎而此亦舒緩之體也詩記曰前漢地理志載齊風俗俟我於著乎而此亦舒緩之體雖非此篇所主然廣谷大川異制民生其間異俗剛柔輕重遲速異齊皆學者所當觀也詩可以觀其此𩔖歟余按漢世去古未逺聲詩猶𫝊得其聲而味之則知其為舒緩之體若以訓詁詞義求之逺矣吳季札聞齊之歌曰泱泱乎大風也哉其太公乎國未可量古有分土亡分民太公以齊地負海舄鹵少五穀而人民寡迺勸以女工之業通魚鹽之利而人物輻湊後十四世桓公用管仲設輕重以富國合諸侯成伯功身在陪臣而取三歸故其俗彌侈織作冰紈綺繡純麗之物號為冠帶衣履天下初太公治齊修道術尊賢智賞有功故至今其士多好經術矜功名舒緩闊達而足智其失夸奢朋黨言與行謬虛詐不情急之則離散緩之則放縱始桓公兄襄公淫亂姑姊妹不嫁於是令國中民家長女不得嫁名曰巫兒為家主祠嫁者不利其家民至今以為俗痛乎道民之道可不慎哉余按平隂廣里有巫兒山豈以主祠女得名邪襄公鳥獸之行南山之詩刺之是已然近代齊俗婦女比之他郡容飾樸野淫風㡬熄欽十五六嵗在鄉里時市井不聞猥言婦女亦簡出入三十年來俗為大變市有葫荽語邑雜倡妓居漸與燕鄭同風矣是誠可憂也昔太公始封周公問何以治齊太公曰舉賢而上功周公曰後世必有簒殺之臣其後二十九世為彊臣田和所滅而和自立為齊侯初和之先陳公子完有罪來奔齊齊桓公以為大夫更稱田氏九世至和而簒齊至孫成王而稱王五世為秦世滅臨淄海岱間一都會也其中具五民云欽按論語曰齊一變至於魯魯一變至於道説者曰夫子之時齊彊魯弱然魯猶存周公之法制齊由桓公之霸為從簡尚功之治太公之遺法變易盡矣故齊俗急功利喜夸詐乃霸政之餘習所謂夸詐亦霸者假仁義之稱耳漢史直謂其失夸奢言與行謬虛詐不情此汲黯詰公孫𢎞之言也𢎞為宰相不能面折庭爭常背公卿正議阿順上指黯目之曰詐當矣詐者𢎞也齊人豈盡然歟且如婁敬亦縱横人也求見言事虞將軍欲與鮮衣敬曰臣衣帛衣帛見衣褐衣褐見則其所守可知況過於敬者可以詐㮣其俗乎夫自戰國以來天下並爭惟齊魯之間學者弗廢漢興言易自淄川田何言書自濟南伏生魯詩則浮邱伯齊詩則轅固生春秋則齊胡母生論語則琅琊王卿膠東庸生遭秦滅學傳經淑後多是齊人故史於齊魯之俗獨曰好經術尚禮義他國則否亦可見其俗之美也先王之化流風善政為世移易豈能無弊齊俗之弊始於管晏較之王政為少差耳故經秦厯漢敦經重義風俗不薄逆亂不萌漢武帝以燕王旦上書欲圖為嗣怒曰生子當置齊魯禮義之鄉乃置于燕果有爭心旦後欲反劉澤謀以臨淄應之尋為雋不疑所誅先是七國作難齊亦不與唐世藩鎮自河北淮蔡以至川蜀無不叛亂惟淄青一鎮未嘗拏兵暨朱温圍昭宗于鳯翔詔徵諸道兵莫有應者獨平盧節度使王師範奉詔感泣奮兵討温事雖無成足表忠赤載諸史䇿斑斑可攷由此言之忠義之風齊俗為多不幸逮金之亂李全父子盜據此方戸編為兵人教之戰父叛于南子叛于北衣冠之族變為卒伍忠義之俗染以惡名全起羣盜的不知何人維揚志云濰州人齊東野語淄州人或又云萊州人未知孰是養子璮本徐希稷之子又出異𩔖齊東野語云全養子璮本徐希稷之子賈涉鎮維揚日璮與涉諸子同學其後全無子屢託涉祝之涉以希稷舊與全稔遂命與之詳見後論非齊氏族客亂山東刼民為逆自速誅夷然敗俗汙善不可不辨或曰然則王著何如曰著盜殺權臣蓋刺客聶政之流惡則惡矣豈璮畔逆之比哉欽惟忠孝之道禮義之俗本諸人心況去古未逺流風可尋非緣禍亂可得而泯也故愚謂齊本詩書之國忠義之邦攷證史實非泛言者嗚呼司馬温公有言上行下效之謂風薫陶漸漬之謂化淪胥委靡之謂流民心安定之謂俗夫教化薫陶固系于上不淪胥于弊陋不委靡于頽波安乎忠孝定乎禮義俾俗不愧古此亦鄉賢之責也隋志曰齊郡舊日濟南其俗好教飾子女淫哇之音能使骨騰肉飛傾詭人目俗云齊倡本出此也祝柯縣俗賔婚大會餚饌雖豐至於蒸膾嘗之而已多則謂之不敬共相誚責此其異也大抵數郡風俗與古不殊男子多務農桑崇尚學業其歸於儉約則頗變舊風東萊人尤樸魯故特少文藝愚按漢志趙女彈弦跕躧徧諸侯之後宫至隋則濟南多倡豈亦高洋之遺風歟今齊俗比燕趙諸郡號為樸野東方尤甚惟濟南水陸輻湊商賈所通倡優游食頗多皆非土人欽佐廉察日朔望行香三皇廟廟旁見倡家立命逐之逮今城中無此輩上官賢牧存心風化此亦易事云洛陽伽藍記後魏楊衒之撰後魏太傅李延寔者莊帝舅也永安中除青州刺史將行奉辭帝謂寔曰懐塼之俗世號難治舅宜好用心副朝廷所委寔答曰臣年迫桑榆氣同朝露人間稍逺日近松邱臣已久乞閑退陛下渭陽興念寵及老臣使夜行罪人裁錦萬里謹奉明敕不敢失墜時黄門侍郎楊寛在帝側不曉懐塼之義私問舍人温子升子升曰吾聞至尊兄彭城王作青州刺史聞其賔客從至青州者云齊土之民風俗淺薄虚論高談專在榮利太守初欲入境百姓皆懐塼叩頭以美其意及其代下還復以塼擊之言其向背速於反掌是以京師謡語曰獄中無繫囚舍内無青州假令家道惡腸中不懐愁懐塼之義起在於此也潁川荀濟風流名士高鑒妙識獨出當世清河崔叔仁稱齊士大夫曰齊人者外矯庶㡬内懐鄙恡輕同毛羽利等錐刀好馳虛譽阿附成名威勢所在促共歸之苟無所資隨即捨去言囂薄之甚也欽按此亦五胡南北離亂之際青有此俗蓋牧守有賢否民心有好惡上之黜陟賞罰不足以厭其心激之使然也甚則至於孫恩之醢縣令黄巢之殺官吏豈特懐塼而已書云予視天下愚夫愚婦一能勝予聖人之畏民如此寧有怒上之俗哉金末内翰鄭子耼知沂州作十愛詞有云我愛沂陽好民淳訟自稀誰言珥筆混萊夷行見離離秋草鞠圜扉俗有登萊沂密腦後揷筆之語子耼治沂民淳訟簡可比山谷江西道院之論故云後之為牧疾民訟而無徳化専恃刑罰欲勝民者能無愧乎王曽沂公言行錄云沂公青州人宋真宗問曰卿鄉里諺云井深槐樹麤街闊人義疎何也曽對曰井深槐樹麤土厚水深也街闊人義疎家給人足也真宗善其對余按古諺鄙齊俗之薄於義也齊自孟嘗任俠過義後世反敗其俗至於近代不惟鄉義疎薄骨肉之恩亦虧喪矣蓋因金亂瘡痍之餘重以李璮之困民有跬地銖産必分膝下嬰孺亦於昆仲有彼已之辨風俗大壊且五代干戈之際民有累世同居旌表者在在紀之豈有承平百年風俗乃薄惡如此可勝歎哉漢志曰南陽好商賈召父富以本業潁川好爭訟分異黄霸化以篤厚君子之徳風也然則齊俗之弊果不可變邪齊乗卷五
