body:
  text: 齊乗釋音卷一沿音緣嚳音酷析音錫括古活切萴實側切虞夏諸侯也峴胡典切山下而險又曰嶺上平與現同莞古桓切又胡官切草可作席辟音璧要去聲干寶搜神記是其撰作于非分去聲殖音寔沭音述水名菑音緇溡音時貕音奚朐音劬酈道元音厯注水經者公玉帶濟南人公玉姓帶名玉一音璛鬩聲激切訟也頟音額葷粥與獯鬻同蚌步項切沐載沐音木姓也劇巨㦸切鸑鷟音岳濯峱奴刀切山名鬐音耆衖音巷音包黄能奈平聲三足鼈也或作熊璮音坦李全之子也不期音基靭音仞斥充夜切罘音浮蜃音慎艘音騷醝才何切鹽也峆㠠音合閭蹲音存窪音蛙澠音繩窖音教趵音豹突宊他骨切方言江湘謂卒相見曰突一曰出貌云㐬説文不順忽出也从到子易云突如其來如不孝子突出不容於内也或从到古文子即易突字也今俗作非駛使去聲疾也卷二龍且子余切項羽將也淀音甸耏音而澅胡卦切水名襌去聲黔陬音鉗郡洱音米直固當作沽滙音潰漸平聲祊音崩涑速搜二音圯音移橋也承音澄又去聲般音盤濼音粕弇音掩茌仕之切殺去聲卷三嶷岳力切小兒有知也并去聲杼音佇颿與帆同鄆音運員音運伷音宙睿音鋭費音祕嶧音亦鄫慈陵切僑音橋鬲音隔郳音倪儒錐切浞仕角切奡音傲疃吐管切輓音晩嵎音愚食其音異基人名商音滴今作商蓨音挑縣名周亞夫所封漯音㙮卬音昂昐音分瑗音院圯音披上聲壊也漚於候切蓍音詩卷四𤣥文𤣥姓文名髠音坤人名駢音便平聲人名奭音釋人名慎到慎姓到名環淵環姓淵名酅音攜斟灌斟姓灌名羿音義澆倪弔切浞之子即奡也璠音繁才賛切贛古暗切驂音參郱蒲經切鄑音進郚午姑切郯音談虺音毁蝮蛇也又人名沓達合切鯀音昆上聲殛音棘炔音桂人名㡉音弦萊州布名唁音硯磾音低𣙜音角舋許慎切間去聲斮音酌胙音助蓋音闔殪於計切死也苛音何酺音蒲蝝音緣蝗蟲子也顓臾音專俞皥音昊盾音遁韙音韋上聲貺音況卷五楷口駭切楷書也木名又音皆毅音義勣音積甍音盲隳音輝廢也輅音路琛丑林切搏音博猸音眉禰音宜上聲叵音頗蒯苦怪切釁許慎切説音税嗾音腠使犬聲也逄音龎湫音啾郠音梗頡胡結切迭徒結切隗五罪切鬻音育嵩音崧闓音凱仆音付徼音邀狙千余切羖䍽音古力舄音昔夸音誇雋徂兖切攷音考漬音恣跕都牒切跕屧也躧所倚切舞履也輻音福湊千候切賈音古恡與吝同耼他甘切珥音耳卷六俑音勇謬米幼切纂作管切集也勝平聲錮音固鎬音浩潁庾頃切覸音間去聲隰音習人名辟音避鱣張連切蚳鼃音池蛙盻匹練切鞅音央上聲詛音與咀同怵音出熾昌志切詘音屈蠋音燭賈音假淖音閙臏音賔去聲穰音常苴七余切敫音皎衷音中又音衆嗇音塞絀音出蹙音促沮音阻倩七性切芻音樞撲普木切襚音遂䌰音聶緎音域緵七公切竅詰弔切緹音提縈娟營切舍上聲眭音綏儈音檜裒音褒邴音丙嘏音假旐音兆弘音與𢎞同曇音潭矚音祝璩音渠勰音協贇紆倫切絞音交上聲爨音竄抔蒲候切褒博毛切墅音聚贅音綴种音蟲讞音言上聲當去聲諼音萱綦崈音其崇傖鉏庚切琪音其後序冶音野調去聲撙音尊上聲奉與俸同稟與廩同鏤音漏
