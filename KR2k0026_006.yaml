body:
  text: 齊乘卷六元于欽撰人物齊記補載漢少翁晉石崇云崇父苞為青州刺史生崇于臨淄小字齊奴夫崇貪財賈禍至死不悟今流俗之弊正坐此失苟得而不顧義務積而不務用財之所在骨肉以之而離良心由是而死崇蓋守錢虜之作俑者齊自太公之後管晏諸賢聖門高弟與夫漢世大儒鄭康成諸公三國人才之冠琅邪諸葛高節蓋世北海管寧此而不書顧彼之取何其謬哉至於神仙高尚之流魯連安期豈不偉歟少翁之徒罔上被誅何足纂也故曰人物非賢才不書此之謂也抑嘗論之人才之多寡繫于教養之當否三代以學校養士逮乎春秋戰國之際賢俊不可勝用皆周之遺才也漢尚經術光武明章益崇儒學幾復三代故漢世人才之多獨不愧古剪于黨錮裂于三國名節愈厲英豪迭出皆漢之遺才也降及隋唐始以詞章取士教養之道劣于古昔人才浸微唐初惟齊州房玄齡宋惟益都王曽為齊士稱首較于兩漢則不及矣以此卜之則知教養之道不可不當其餘則各訂于後云太公後漢志琅邪西海縣太公吕望所出有東吕鄉廟舊在臨淄西營邱宋碑存焉冢在縣南十里與頃公冢相近愚按檀弓曰太公封于營邱比及五世皆反葬于周注謂太公受封留為太師死葬鎬京五世獻公以上皆從葬焉則齊無太公之墓或曰齊人思其德葬其衣冠云路史云名涓字子牙汲人桓公舊與太公同廟齊自太公為世胙之祖桓公為五霸之宗威王亦戰國賢主然以篡立義不敢取餘無可稱者仲山甫太公之後為宣王冢宰兼太保王命築城于齊尹吉甫作蒸民詩以送之管仲本穎上人齊相墓在臨淄南牛山之阿見史記正義晏平仲萊之夷維人故宅左臨淄小城北門即左傳近市宅也墓亦在焉成覸齊人謂景公曰彼丈夫也我丈夫也吾何畏彼哉可謂志士鮑叔墓在滕州北十五里寧戚墓在膠水縣西隰朋東郭牙弦寧王子成甫新序曰管仲請於桓公以寧戚為田官隰朋為大行東郭牙為諫臣王子成甫為大司馬曰君欲治國強兵此五子足矣如欲霸王則夷吾在有司請吏公曰以告仲父又請公曰以告仲父如是者三在側曰一則仲父二則仲父易哉為君公曰未得仲父則難已得仲父何為不易桓公與羣臣飲酒謂鮑叔曰姑祝寡人鮑叔奉酒起而祝曰君無忘其在莒也管仲無忘束縛從魯也寧戚無忘飯牛車下也桓公避席拜曰寡人與大夫皆無忘夫子之言社稷必不廢矣麥邱邑人祝桓公無得罪於羣臣百姓者郭墟野人謂桓公善善不能用惡惡不能去所以亡者桓公賞焉小臣稷桓公曰士慠爵祿者輕其主主慠霸王者輕其士吾敢慠霸王乎五往始得見稷石他人陳恆弒簡公不肯盟而自殺又有子淵棲者恆以勇士劫之亦不從二人並見新序國成子高齊大夫擇不食之地而葬見檀弓又有國昭子春秋有國書國佐皆其族也陳文子名須無齊大夫齊太史昆弟三人書崔杼弒君者左氏逸其姓名惜哉徒人費死襄公之難又有石之紛如孟陽皆襄公小臣亦死節高柴史記作鄭人家語曰齊人高氏之别族墓在沂州向子城側公冶長家語魯人史記齊人集注兩存之樊遲家語魯人史記齊人陳亢家語作陳人愚按檀弓亢乃齊大夫陳子車之弟疑是齊人梁鱣家語齊人步叔乘史記齊人公折哀家語齊人鄙天下多仕于大夫家者故未嘗屈節其亦汶上之亞歟墓在般陽城北后豦史記齊人右八人聖門弟子公孫丑滕州北公村有墓萬章乃滕州南萬村有墓右皆齊人孟子弟子餘見鄒廟從祀滕文公滕州有廟蚳蛙齊士師以孟子言諫齊王不用而去匡章齊人孟子禮貌之必有所取故集注云衆惡必察可見聖賢至公至仁之心檀子盻子黔夫種首威王臣四子將照千里見通鑑淳于髠齊稷下學士髠衍輩七十餘人餘不取者大學衍義曰孔子沒異端遂作鄒衍淳于髠田駢之徒各著書以干世主不可勝紀申不害商鞅其害尤甚孟子所深距者惟楊墨二氏程子所謂楊墨之害甚於申韓佛老之害甚於楊墨然則衍輩亦異端之流髠獨知尊孟子稱之曰夫子又一日而見七人於宣王差賢于諸子故取之或曰均異端也申韓則不闢而廢楊墨距之而熄佛老則闢而愈熾何邪蓋異端至佛老而極道至後世而晦如人元氣既衰痼疾可得療乎然闢之而不廓者其説有二夫鬼神祭祀之禮聖人所先制緣人情理明儀備殆戰國以降盟詛相持鬼神之理不明事鬼之情愈切佛氏乘之怖以死生誘以禍福凡古人之敬事鬼神齋戒禱祠報本祈福之意一歸于佛廣大包羅驅世有情信之事之此雖粗迹而勢不可廓聖賢有不動心之學世儒多務外馳於利害怵迫之餘見佛氏之堅定則灑然心服謂道在頓省之間不知吾道自有此理體用尤精舍已耘人往往皆是此為精微其理亦不易辨粗以籠愚精以釣賢非復三代之治而欲決此疾猶以杯水救輿薪之火也其熾宜矣閭邱卬年十八求仕於宣王王曰士亦華髮墮顛而後可用子年稚未可也卬曰尺有所短寸有所長華髮墮顛與臣何異宣王用焉香居諫宣王為大室者王斗皇甫士安高士傳齊隱士黔婁子齊隱士守道不詘威王師之王蠋臨淄畫邑人墓在愚山西王孫賈齊大夫奉母訓誅淖齒者田單臨淄人愚按蠋以布衣死節賈以一夫討賊單之功偉矣所以勵齊人之氣未必非二子也故先之孫武子濰州昌邑縣北海濵有廟武孫臏齊軍師司馬穰苴並齊人顔蠋齊人晚食以當肉東坡所謂巧於貧者子奇齊人十八為阿邑宰出倉廩以賑貧乏邑內大化見説苑無鹽女齊人姓鐘離名春宣王后宿瘤女齊東郭采桑女閔王后並列女傳貫珠人諫齊王怒田單者太史敫莒人君王后父敫曰女不取媒自嫁汚吾世終身不見余謂後世外戚如楊國忠之流求通房闥不遺餘力敫真有守哉雍門司馬諫王建者惜逸其姓名荀卿少遊學于齊三為稷下祭酒避讒適楚春申君以為蘭陵令田文齊靖郭君田嬰子田橫元和志海州東海縣北五十七里有田橫國即田橫島魯仲連齊人安期生東郭先生梁石君右三人皆齊處士見蒯通傳安期又見列仙傳云琅邪阜鄉人賣藥海邊人言千嵗公始皇賜金璧棄去不受留書報曰後千嵗求我蓬萊山下欽按神仙之説六經所無原於老子玄抱一之論秦漢間怪迂之士設為誇大之言以徼當世多欲之君至有封侯尚主貴震天下如文成五利之徒終以詐誅故後世談仙者率歸誕妄至紫陽朱夫子以明理盡性之學會古今諸家而折衷之以為仙者匪難但偷生為不可見於感興之詩又隱名而校參同至取逺遊王子之言以為長生久視之要訣何也蓋仙者必有大賢明睿之資精察造化純一不離如釋氏之慧定又得明師訣其火藥毫釐不差根氣清厚福如王者庶幾有成也成謂能長久雖與天地同弊亦不能不散也觀安期之策撼項羽魯連之輕世肆志陳希夷之不帝而隱概乎其人下此則山林枯稿之徒嗇氣葆精差可少病以待天年冀其竊化機以出宇宙萬無一焉雖使紫陽復生亦必道還汝具一隻眼也秦淳于越齊人諌始皇曰今陛下有海內而子弟為匹夫卒有田常六卿之患何以相救事不師古而能長久者非所聞也始皇下其議為李斯所絀茅焦齊人諫始皇遷母者司馬溫公有言風俗天下之大事也於茅焦亦見之矣自三代有殺身成仁之教至於戰國習以成風義之所在蹈死如歸奉起而力禁之誹謗者族偶語者棄市至戮諫者二十七人而茅焦猶諫蓋由當時風俗驅之見義而不見死故也秦能因俗以治三代可及必欲峻刑變俗以自蹙亡至於後世傷一諫臣沮一言者則天下從風而靡亦薄俗使然也漢四皓夏黃公留侯世家注云夏黃公姓崔名廣字少通齊人蓋公膠西人婁敬齊人通典曰齊俗人情變詐故高帝詈婁敬曰齊虜以舌得官夫敬料胸奴匿兵爭利智也勸帝勿擊忠也高祖不從致有白登之困高祖失言敬何詐之有叔孫通薛人伏生名勝濟南人墓在朝陽故城東五里見水經東方朔平原人鄒陽齊人傳有王先生公孫玃皆齊之智士故陽曰鄒魯守經學齊楚多辨智韓魏時有奇節而辨智者流於詐也轅固齊人漢武始好儒迂仲舒疾轅固公孫達于前張禹孔光顯于後西漢風俗不美良有以夫鄒長倩災川人遺𢎞書曰公孫𢎞以元光五年為國士所推上為賢良國人鄒長倩以其家貧少自資致乃解衣裳以衣之釋所著冠履以與之又贈以芻一束素絲一襚撲滿一枚書題遺之曰夫人無幽顯道在則尊雖生芻之賤也不能脫落君子故贈君生芻一束詩人所謂生芻一束其人如玉五絲為䌰倍䌰為升倍升為緎倍緎而為紀倍紀而為緵倍緵而為禭此自少至多自微至著士之立功勳效名節亦復如之勿以小善不足修而不為也故贈君素絲一襚撲滿者以土為器以蓄錢貝其有入竅而無出竅滿則撲之土粗物也錢重貨也入而不出積而不散故朴之士有聚斂而不能散者將有撲滿之敗可不誡歟故贈君撲滿一枚猗歟盛哉山川阻修加以風露次卿足下勉作功名竊在下風以俟嘉譽欽纂齊乘凡書傳所通習如景公登牛山杞梁黔敖之類則不詳載如此篇者蓋西漢奇文世所罕見且其積絲之喻撲滿之戒實古今之格言最有益於學者故備載焉𢎞開館延賢鄉有二奇士皆不知引之則所延者果何人哉此其有以為詐人也撲滿吳人名曰藏瓶次卿𢎞字漢書弗載公孫𢎞災川人開東閣以延賢人亦足以為百世宰相之師故載路史淄州南四十里大薛山𢎞生處兒寬千乘人御史大夫嚴安臨淄人騎馬令終軍濟南人諫大夫墓在臨淄南牛山之西地名終村又厯城南九十里有終軍村王欣濟南人代田千秋為丞相封宜春侯淳于意女緹縈臨淄人疏廣疏受蘭陵人于公字定國丞相西平侯匡衡東海承人御史大夫蕭望之蘭陵人關內侯王吉字子陽琅邪臯虞人貢禹同鄉史稱王陽在位貢禹彈冠言其取舍同也然吉為宣帝言曰欲治之主不世出公卿遭遇其時未有建萬世之長榮舉明主於三代之隆者也其務在於期會簿書斷獄聽訟而已此非太平之基也甚欲有所匡建與賈誼仲舒之意同宣帝乃以為迂禹為元帝言曰廏馬萬匹宫女數千園陵郡國廟皆當滅毁務遵儉約元帝悉納用其言蓋圖逺大者難為功舉細務者俗易從二人所見如此惡在其為取舍同也善乎司馬溫公論曰孝元優遊不斷讒佞用權當時之大患禹不以為言恭謹節儉孝元之素志禹孜孜言之何哉使禹之智不足知惡得為賢知而不言其罪大矣余故黜禹以為人臣泛言塞責者之戒諸葛豐琅邪人司隸校尉孔明祖田何齊人以諸田徙杜故號杜田生守道不仕惠帝幸其廬以受業為易者宗見高士傳儒林傳易自田何後有琅邪人魯伯邴丹王橫諸縣人梁邱賀父子東萊人費直書自伏勝後有千乘人歐陽生子孫世學兒寬師也濟南人林尊齊人周堪魯詩自浮邱伯後有琅邪王扶齊詩自轅固後有琅邪人大司馬師丹皮容韓嬰詩有淄川人長孫順三詩後世皆亡毛萇詩又得鄭康成箋行于世大戴禮琅邪人徐良公羊胡母生之後有琅邪人王中公孫文東門雲管路左咸淄川任公穀梁有不其人房鳯皆齊人明經而伏生諸儒已載前論不復出焉鄭崇高密大族哀帝擢為尚書僕射納用其言每見喜曰我識鄭尚書履聲諫寵董賢浸疏之責崇曰君門如市何以禁切主上崇對曰臣門如市臣心如水上怒下獄死眭𢎞蕃人以明經為議郎至符節令元鳯三年上書被殺孝昭徵其子孟為郎顔安樂薛人眭孟姊子積學至齊郡丞母將隆蘭陵人京兆尹執金吾王莽秉政以隆少時不肯與交誣以罪免官徙合浦鮑宣渤海人司隸以忠直為王莽所殺妻桓少君栗融禽慶蘇章薛方四人皆齊隱士去官不仕王莽見鮑宣傳逄萌都昌人學長安王莽殺子宇萌曰三綱絶矣不去禍將及人即解冠挂東都門隱勞山光武徵不起又有同郡徐房王君公與萌友善亦隱遁不仕君公儈牛自晦時人語曰避世牆東王君公或曰兩漢人才首蓋公與逄萌豈有意乎應之曰先輩有言能令漢家重九鼎桐江波上一絲風又曰世祖功臣三十六雲臺爭似釣臺高此之謂也萌墓在北海縣西南營陵城中伏湛琅邪東武人伏生九世孫傳經學仕至司徒清靜無競東州號曰伏不鬬子隆死節兄子恭傳齊詩王良蘭陵人王莽時寢疾不仕光武徵拜大司徒司直在位恭儉布被瓦器衛宏臨沂人序毛詩訓古文尚書光武拜議郎作漢舊儀載西京雜事傳于世吳良議郎江革世稱江巨孝並臨淄人劉寵東萊人號一錢太守姪劉繇漢末揚州刺史曹裒薛人明慶氏禮博物識古為儒者宗寒朗薛人為明帝辨楚獄者侯史光掖縣人散騎常侍與皇甫陶等持節循省風俗還奏事稱旨遷少府卒家貧賜錢以葬趙彥琅邪人勸宗資發五陽郡兵從孤虛推遁甲破徐兖群盜鄭康成大司農高密人宋封高密伯滕撫北海劇人涿令破東南群盜者王望琅邪人青州刺史擅發廩賑飢者淳于恭北海淳于人以孝義徵為郎童恢琅邪姑幕人循吏周璆樂安人陳蕃傳公沙穆膠東人明經舉孝廉遷鄫相承宫琅邪姑幕人中郎將明春秋司馬均東萊人隱居教授誠信行乎鄉里爭曲直者輒曰敢祝少賔乎心不直者終不敢少賔均字祝詛也牟融太尉郎顗明京房易周澤甄宇二人皆博士明公羊傳孫嵩五人並安邱人嵩安邱有墓徐苖淳于人纍世相承皆以博士為郡守諸葛武侯琅邪人孫乾北海人事昭烈為秉忠將軍禰衡平原人文士才辨性多傲忽傲其儕輩而已衡敢罵辱曹操有威武不挫之志文人相輕者愧衡多矣魏徵士管幼安北海朱虛人邴原幼安同郡人魏丞相徵事王烈亦北海人漢末三人皆適遼東依公孫度以避亂度安其賢民化其德國淵任嘏並樂安人康成弟子俱仕魏王修北海營陵人魏青州别駕母社日亡悲感鄰里為罷社任旐樂安博昌人黃巾賊到博昌聞旐姓名曰夙聞任子旟天下賢士那可入其鄉王基東萊曲城人魏征南將軍諸葛誕琅邪人揚州都督起兵討司馬昭不克而死吳太史慈東萊黃人建昌都尉孫策曰聞君為太守劫州章赴文舉詣玄德皆有義烈天下智士也諸葛瑾琅邪陽都人吳豫州牧孔明族弟吳志曰葛氏本諸人徙陽都陽都先有姓葛者故時人謂之諸葛徐盛莒人吳安東將軍是儀營陵人吳尚書僕射滕胤劇人吳都亭侯晉羊祜泰山南城人南城久廢地屬費縣祜費縣人也上征吳策唐彬乃鄒人司徒王導臨沂人南史弘融曇首儉僧虔恭志筠彬皆導族劉毅東萊人尚書僕射謂晉武為桓靈者任愷博昌人侍中光逸樂安人八達解系濟南人守正不阿為趙王倫所殺伏滔安邱人大元中拜著作郎専掌國史領本州大中正子系之亦有文名繆播蘭陵人晉懷帝中書令掌詔命盡忠為國為東海王越所害朝野憤惋曰善人國之紀也而加害焉其能終乎越死贈衛尉王尼城陽人不拜東海王越越問之對曰公無宰相之能是以不拜劉胤掖縣人避亂依冀州刺史邵續續欲降石勒胤勸續歸晉元帝以胤為丞相參軍仕至江州刺史王羲之司徒導從子余按晉室清談王謝不能免羲之獨不為流俗所移觀其止殷浩北伐之書對謝安登冶城語真豪傑之士哉使其得君王謝不足多後世徒以書札掩其器識故朱子惜之劉超琅邪人蘇峻遷帝于石頭猶啓帝受經者顔含琅邪人劉敏元北海人忠義傳徐邈姑幕人儒林傳左思臨淄人作齊都及三都賦石坦劇人無居業不娶妻弔喪會葬同日共時處處見之姚萇之亂莫知所終蓋異人也王隱晉書秦王猛劇人孫鎮惡宋史有傳孫憲後魏并州刺史北海公清身率下北史有傳九子世號九龍子晞曰非不愛作熱官但思之爛熟耳亦名言也或曰先儒謂孟子以後人物惟有子房孔明魏晉以降張賔崔浩皆比子房王景略則謂如諸葛數子優劣果何如也愚曰孟子王佐之才使值炎劉之奮未必屑漢庭功業諸公皆功名士也故以才智相方不大相逺就其出處進退觀之則有間矣浩事暴君以殺身賔贊羯勒以傾晉景略視二子為優比之諸葛則不能無愧嗚呼天下英才不遇者多矣幸而成功不一二數也景略之儔容可棄乎南燕晏謨臨淄人撰齊記晉載記曰南燕主慕容德登營邱問謨以齊之山川邱陵賢哲舊事謨厯對詳辨畫地成圖德深嘉之拜尚書郎德又因饗宴乘高逺矚顧尚書魯邃曰齊魯固多君子當昔接慎巴生淳于鄒田之徒蔭修簷臨清沼馳朱輪佩長劒恣非馬之雄辭奮談天之逸辨指麾則紅紫成章俯仰則邱陵生韻至於今日荒草頽墳氣消煙滅永言千載能不依然元魏賈思伯益都人弟思同俱好經史思伯仕至都官尚書謙恭下士人曰公今貴重寧能不驕思伯曰衰至便驕何常之有世以為雅言思同仕至侍中今壽光南有墓碑唐永北海平壽人後魏北地良將性清廉無積蓄妻子不免飢寒二子陵瑾皆儒雅知名次子瑾宇文周賜姓萬紐于氏王𢎞臨沂人隱會稽釣魚采藥謝靈運顔延之並相欽重沈約宋書王素琅邪人隱東陽山山中有蚿蟲聲清而形醜作賦以自況齊任昉博昌人博學能文明僧紹平原人初隱勞山弟慶符以青州刺史罷任隨歸隱江東齊太祖稱為外臣孟喜蘭陵人父孟卿父子並傳禮易臧榮緒莒人撰東西晉紀與關康之俱隱京口時號二隱顔見逺琅邪人南齊御史中丞蕭衍殺齊主見逺死之子協孫之推皆知名諸葛璩琅邪人齊梁徵辟皆不就隱居教授妻子不見喜愠之容梁孫謙東莞人循吏劉協東莞人撰文心雕龍伏曼容密州人臨海武昌太守解易詩論語老莊隋隱士徐則郯人隱縉雲山絶粒養性杜松贇北海人大業末賊攻北海執松贇使諭城降松贇罵賊而死張軌臨邑人與樂安孫樹仁為莫逆交每易衣而出以此見稱西魏恭帝時除隴右府長史卒家無餘財唯有書數百卷張買奴平原人高齊太常博士北史儒林傳云買奴經義該博門徒千餘人諸儒咸推重之尤精服氏春秋又云自晉杜預注左氏預玄孫坦坦弟驥在宋並為青州刺史傳其家業故齊地多習之孫益德樂安人其母為人所害益德童幼復仇不避魏孝文后特免之見北史孝行傳又北海王閭數世同居有百口見節義傳苟金龍妻劉氏平原人苟為梓橦太守疾病賊圍城劉氏代帥將士拒戰賊奪水城中渴甚劉仰天號訴得雨以衣服懸絞取水卒完城北史烈女傳宋劉穆之東莞人左僕射臧燾莒人兄子質守盱眙拒魏太武者徐廣東莞人撰晉紀顔延之琅邪人作五君詠段文振北海人諫煬帝寵突厥者唐房玄齡齊州人墓在濟南東南采石山秦叔寶厯城人羅士信亦厯城人濟南府城中有羅姑井相傳士信故宅段志玄臨淄人房秦段皆凌煙功臣志玄孫文昌仕至太尉文昌子成式太常少卿並有才名馬周茌平人杜伏威章邱人大業末據淮南歸唐封太子太保兼行臺尚書令任敬臣棣州人五嵗喪母哀毁天至問父曰何以報母父曰揚名顯親可也乃刻志從學舉孝廉虞世南器其人薦為𢎞文館學士終太子舍人員半千齊州全節人武陟尉嵗旱勸令發粟賑民令不從及令謁州半千悉發之下賴以濟刺史怒囚半千于獄會薛元超持節度河責刺史曰君有民不能恤使惠出一尉尚何罪釋之後仕至太子諭德封平原郡公或問先賢行迹例多不載惟賑恤一事自子奇王望半千三人皆詳書之何也對曰欽聞富鄭公不言使遼之功至知青州活飢民五十餘萬自謂賢於中書二十四考此豈細務哉延祐六年己未齊地大飢父子相食欽銜命賑恤濟南六縣泊鹺竈飢民嘗以勸率富民出粟太多賑濟太廣見責于憲府時官僚有幸此凶嵗捐斗升以鬻子女舉曰過房悉輦以北欽則訪鬻子者為贖還之乃怒曰是違例徼譽也欽憤鬱久矣無從發之故於三子之事不自知其筆之瀆也嗚呼董煟有言人微無肯信其言官小莫能行其志微子墨卿吾誰與言歟顔魯公弟杲卿並琅邪人刺史蔣欽緒萊州人與沂州蕭至忠姻家戒至忠曰君材不患不見用患非分而求耳至忠果附太平公主預禍崔融齊州人鳯閣舍人諸孫多顯宦符令奇臨沂人田悅反死節張允濟北海人循吏顔師古臨沂人注漢書其敘例諸家名氏有琅邪伏儼北海劉德皆漢末注班書者因附見云王仲邱琅邪人明禮王希夷滕人為人牧羊取傭以葬親隱徂徠山玄宗訪以道義授朝散大夫聽還山郭虔瓘厯城人右驍尉將軍兼北庭都護戰功甚多王無競東萊人監察御史臨朝斥宰相宗楚客偶語左遷太子舍人高適渤海人諫議大夫忤權近出刺蜀年五十始為詩即工高沐渤海人貞元中進士李師古辟署判官師道叛沐以誠欵結天子為師道所殺盧惟清妻徐氏淄州人惟清貶播州會赦徐迎惟清至荆州聞惟清死二奴將劫徐歸下江徐數其罪奴不敢逼徐倍道至播州得惟清尸還葬齊浣高其節作詩頌之崔信明益都人秦川令吟楓落吳江冷者五代王凝妻李氏青州人斷臂者石昂臨淄人昂讀書好學不求仕進節度使符習高其行召為臨淄令入朝以公事謁監軍楊彥朗贊者以彥朗家諱石更其姓曰右昂昂責彥朗曰內侍奈何以私害公昂姓石非右也彥朗大怒昂即解官去語其子曰吾本不欲仕亂世果為刑人所辱邊鳯濵州人五世同居無異爨天子旌其門復其家又王陶密州人數世同居五代史孝友傳王師範青州人歐陽子曰孟子謂春秋無義戰豫謂五代無全臣其仕不二代者以國繫仕非一代者作雜傳夫入于雜誠君子之所羞而一代之臣未必皆可貴欽按五代名節李氏尚矣青州五臣惟石昂有孝節稱疾辭祿及節度使王師範為可取其餘皆不足貴也史稱師範好學以忠義自許為治有聲績朱溫圍鳯翔師範見詔書泣曰吾屬為帝室藩屏豈得坐視天子困辱雖力不足當死生以之遂起兵討溫求助於楊行密斬朱友寧于青州及淮南兵歸力不能支遂降溫為其所族嗚呼師範欠兵敗一死耳原其本心非朝梁而暮晉者故綱目特書曰平盧節度使王師範發兵討朱全忠又曰王師範以淮南兵擊朱友寧斬之曰討曰斬則與之之意可見矣況其處死不亂又毅然丈夫哉汩之雜傳則其志亦可哀也已故特表而出之南唐韓熙載青社人五代之亂熙載投南唐纍官至中書侍郎多置妓妾晝夜歌舞謂僧德明曰吾為此行正欲避國家入相之命僧問其故熙載曰中原常虎視於此一旦真主出棄甲不暇吾不能為千古笑端初熙載之走江南也李穀送别各言所志熙載曰江南果相我當以長驅定中原穀曰中原若相我下江南如探囊中物穀後相周世宗定江南而熙載之言不驗胡氏以為熙載文士高談非穀沈毅有智略之比是故然已使世宗唐主易地而君熙載豈無能為者知時不可為而能沈晦以免禍其智亦足稱也繁欽於劉表數欲見奇杜襲喻之而止李驤為劉崇所殺至有吾負經濟之才乃為愚人謀事死固有甘心之歎然則熙載其賢乎孫晟密州人南唐宰相周世宗征淮南唐遣晟使周晟謂其副曰吾行必不免然終不負永陵一抔土後為世宗所殺正其衣冠南望拜曰臣以死報國乃就刑宋傅霖青州逸人乖崖稱曰傅先生天下士王曽益都人狀元丞相文正公弟皥字子融直集賢院初新舊五代史皆不與韓通立傳識者笑之皥著唐餘録有紀志傳又博采諸家説俲裴松之三國志附注於下表韓通於忠義傳冠以宋初褒贈之典新舊史皆所不及文正嘗言曽平生之志不在溫飽皥器識若此可謂難兄難弟矣蔡齊萊州人狀元參政文忠公吕夷簡萊州人丞相文靖公六世孫伯恭號東萊先生宋會要濵州有夷簡祠公通判濵州奏不稅農器王曽知其有相業王從善青州人太宗雍熙二年始踰冠九經及第見長編李之才青州人師穆伯長博陳希夷先天易嘗謂邵康節曰科舉之外有義理學義理之外有物理學物理之外有性命學康節曰願受教遂傳易學麻希夢前青州録事參軍年九十餘居臨淄太宗以高年詔至闕詢及人間利害敷對詳明訪以養生之理對曰臣無他術惟寡情欲節聲色薄滋味詔以尚書工部郎中致仕賜金紫子景孫興國中登進士甲科孫溫其溫舒祥符中相繼第三人及第衣冠以為盛事天下稱麻氏教子有法孫仲英幼有俊才七嵗能詩以親亡祿不及養不復肯仕退居臨淄七里别墅博學高行鄉黨化服雖凶年盜不入其家富韓公文潞公龎莊公相繼鎮青皆致書幣薦其行義詔以為國子四門助教州學教授東方學者咸師之亦年九十餘卒賈先臨淄人登進士真宗賜名同改字希德以扶道著書為己任著山東野録七篇頗類孟子奏疏言丁謂造作符瑞以誣皇天以欺先帝今幸為姦發竄逐請明告天下還冦萊公以明忠邪終以孤直不偶官止殿中丞卒門人諡曰存道先生王樵字肩望淄川人性超逸深於老易善擊劒有概世之志廬梓桐山下不交塵俗山東賈同李冠皆尊仰之咸平中契丹內冦舉族北俘纍年乃歸刻木為親葬奐山東立祠奉侍終身太守劉通詣樵踰垣遁去其後高辨知州事范諷為通判相與就見之李冠以詩寄之曰霜臺御史新為郡棘寺廷評繼下車首謁梓桐王處士教風從此重詩書晚自號贅世翁豫卜地壘石名繭室刻銘其上曰生前殺軀以虞不備沒後寄魂以備不虞後感疾即入繭室中自掩戶乃卒命以古劒徇葬著遊邊集二卷安邊三策説史十篇濟南李芝為贅世先生傳治平中淄川詩僧文幼即其地起祠祀樵其為世景慕如此劉孟節壽光人少師种放天姿絶俗篤古好學酷嗜山水青之南有冶原歐冶子鑄劒之地山奇水清叢筠古木氣象幽絶孟節欲隱其間富韓公為築室泉上詩以餞之曰先生已歸隱山東人物空其後范文正公文潞公皆優禮之欲薦之朝孟節懇辭少時嘗寓龍興僧舍往往憑欄獨立懷世事手拍欄干吁唏太息有詩曰讀書誤我四十年幾回醉把欄干拍見司馬溫公詩話張荷壽光人師事种放與吳遁魏野楊朴宋澥為友性高潔為文奇澀著過非九篇放謂隋唐以來綴文之士罕能及之終以運蹇不遇卒有詩文三卷見澠水燕談蘇丕青州人祖德祥建隆四年狀元丕有高行少時一試禮部不中拂衣去居渳水之濵五十年不踐城市歐陽文忠公鎮青言於朝賜號沖退處士年八十餘卒周起鄒平人母感吉夢而生父異之謂必大其門因名曰起第進士通判齊州召直史館真宗東封羣臣多獻文頌起獨上書言天下之勢患於安逸而忽於兢業真宗佳之拜諫議大夫終樞密副使劉廷式齊州人蘇軾知密州廷式為通判初廷式未遇時約取鄉人之女及第後女喪明廷式卒娶之女死喪之踰年而哀不衰因不復娶軾問曰哀生愛愛生色君愛何從生哀何從出廷式曰吾知喪吾妻而已若緣色生愛緣愛生哀色衰愛弛吾哀亦忘則凡揚袂倚市目挑而心招者皆可以為妻邪軾深感其言廷式後監太平觀老于廬山絶粒不食而面目奕奕有光步峻坂如飛以壽終薑遵淄川人初舉進士為蓬萊尉以擊搏知名天聖七年拜樞密副使卒贈吏部侍郎明鎬密州人參知政事與文彥博同時李常字公擇登州人知齊州齊多盜常得黠盜刺為兵置麾下詢知弭盜之術姦無所容嘗為富鄭公客李師中榜其閭曰遺直坊東坡有詩燕肅字穆之青州人龍圖閣待制知審刑院請讞諸路寃獄有不當者釋其罪自是全活者衆肅有巧思嘗造指南車記里鼓及欹器蓮花漏世服其精趙師民字周翰臨淄人九嵗能文第進士官至龍圖閣直學士子彥若哲宗時翰林學士紹聖初章惇以彥若與修神宗實録貶死李覺字仲明益都人舉九經起家知泗州遷禮記博士賀元琅邪人真宗東封謁於道左曰晉水部員外郎賀元再拜東坡記詩云舊聞父老晉郎官已作飛騰變化看聞道東蒙有居處願供菽水看燒丹蓋仙人也雪竇襌居琅邪山身被布衫五十年不易向薌林嘗為青州雪竇布衫倡云趙州無義漢雪竇老婆襌一川風雨後明月却當天周沆字子真益都人纍官至樞密直學士安撫使溫公銘其墓云光昔通判并州事公於河東銘曰古之君子德盛道尊望之儼然即之也溫公正衣冠嚴不可干施之于政乃仁乃寬吏畏而悛民思弗諼欵銘垂美以告後昆碑今在益都城南駝山下異人徐問真濰州人與歐陽文忠善一日求去甚力歐公留之不可曰我友罪我與公卿遊公使人送之果有鐵冠丈夫長八尺餘俟於道周以瓢覆酒於掌中以飲提笥童子遣回不知所往童子徑發狂亦莫知所終嘗教歐公引氣愈其足疾東坡試之亦驗于燾字彭年壽光人博學能文頗喜言兵慶厯中元昊數冦邊敵人乘釁聚兵求關南地丞相吕文靖公召彭年計之彭年云宜治西北行宫若將親征者以壓其謀乃以大名府為北都二敵果請盟仁宗春秋高皇嗣未立登州岠嵎山數震彭年上疏曰岠嵎極東方殆東朝未建人心搖動之象宜早定儲以安天下齊宜為節度逮英宗入繼乃由齊邸人以先識稱之張藴淄川人咸平中契丹入冦淄川城壘不完刺史欲棄城奔南山藴時為郡兵馬監押按劒曰刺史若出吾當斬以徇卒完城後為環州馬嶺鎮監押雖處窮塞猶建孔子祠刻石為記范文正公書其碑隂以美之其後子孫皆以文學才行登侍從云吕頤浩齊州人南渡丞相忠穆公內翰綦崈禮高密人徙濰州北海故人稱北海先生崈禮隨高宗南渡掌王言凡下詔旨讀者感動時議以為中興之功非特將士宣力詔令亦有助焉如陸宣公之在奉天也見重如此以忤秦檜位不進翰林侍讀袁伯長云北海子孫見寓四明為衣冠名族辛幼安濟南人宋名臣言行録黜稼軒不取朱文公稱曰稼軒帥湖南賑濟榜秪用八字雖只粗法便見他有才況其忠英之氣見于辭翰者不一嘗言曰敵人六十年後必滅敵滅而宋之憂方大其識如此宋人既以傖荒遇之而不柄用中原又止以詞人目之為可惜也故識之宋實録載幼安贊韓托胄用兵托胄敗幼安獲罪於士論非也稼軒豪傑之士枕戈待旦有志於中原久矣宋人舉國聽之豈無所成托胄之敗正陳同父所謂真虎不用真鼠枉用之所致以此議公可乎金劉迎東萊人太子司經有文集號山林長語章宋詔國學刋行周馳濟南人在太學以䇿論魁天下貞祐濟南破不肯降攜二孫赴井死張行簡莒州日照人詞賦第一人及第仕至翰林學士承旨備於禮文之學典貢舉三十年門生遍天下弟行中亦進士仕至參知政事言虎賊必反抗權臣高琪為士論所稱右四人並見中州集李國維淄川人進士厯符離葉二縣令著清名蚤年鄰家有窖銀者兵後無人國維掩而不發見楊素菴事言補楊𢎞道字叔能淄川人金末補父廕不就與元遺山劉京叔楊煥然輩皆以詩鳴大為趙間間諸公所稱避亂走襄漢宋人辟為唐州司戶兼文學不久復棄去晚寓益都嘗一見李璮議不合為用事者所嫉浮沈閭里以詩丈自娛著小亨集事言補等書行于世延祐三年贈文節齊乘卷六
