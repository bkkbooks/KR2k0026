body:
  text: 齊乗後序昔我先人為國子助教每謂潛曰吾日與諸生講習所業暇則又與翰苑諸名公唱和詩章詩乃陶冶性情而已若夫有關於當世有益於後人者宜著述以彰顯焉吾生長於齊齊之山川分野城邑地土之宜人物之秀此疆彼界不可不纂而紀之也迨任中書兵部侍郎奉命山東於是周覽原隰詢諸鄉老考之水經地記厯代沿革門分𩔖别為書凡六卷名之曰齊乗藏於家囑潛曰吾或身先朝露汝其刻之先人既卒常切切在念第以選調南臺又入西廣匆匆未遑遂志兹幸居官兩浙始克撙節奉稟命工鏤板以廣其𫝊以光先徳㕘政伯脩先生已詳序於前矣有仕於齊者願一覽焉至正十一年辛夘秋七月奉訓大夫兩浙都轉運鹽使司副使男潛百拜謹識
