body:
  text: 齊乘卷二元于欽撰益都水濰水水經云出琅邪箕縣濰山許慎吕忱云箕屋山淮南子云覆舟山廣異名耳實一山也今清風山在莒州莒縣北百里漢箕侯國地東北流逕仲固山折泉水入焉折泉出松山漢有折泉縣又東北逕密州城西折而北涓水合扶淇水入焉涓水出馬耳山扶淇出常山竝見水經今名孛齊河又北盧水入焉盧一名久台音怡水出盧山漢横縣之故山也道元謂盧水側有不灰木野火燒死炭不滅又東北至巴山密水入焉密又名百尺有二源一出障日山東坡所謂小峨嵋者一出五弩山今作鹵山又東北浯水入焉浯出高柘山高柘山今名臺頭浯水今名南清河東北納荆水三齊記昔人堰浯入荆溉稻田萬頃荆水出荆山逕平昌故城臺下合雹泉入浯道元謂濰水過平昌臺下有井與荆水通有龍出入其中土人謂其城曰城陽城臺曰城陽臺雹泉者泉湧如雹有龍祠宋封靈霈侯疑即古龍井又北逕龍且冢冢在濰水東岸五里淮隂囊沙處也道元謂高密碑在水西古人堰濰水以溉田散流入夷安潭亦此地今高密西有古堤南起岑冢北亘蔡冢長三十餘里謂是岑彭與蔡伯喈冢非也正古堰遺跡土人名曰趙貞女防夷安潭今名都濼古奚養澤也又北逕城隂故城西又北至安丘東北古淳于城側汶水入焉又東北過昌邑又東北入于海漢志濰或作淮故俗亦名淮河淄水書傳曰出泰山郡萊蕪縣原山之隂東至博昌入海按地志水黑為淄元和志云俗傳禹理水功畢土石黑數里之中波流皆黑故謂之淄水也出今益都縣顔神鎮東南二十五里岳陽山東麓地名泉河古萊蕪地岳陽即原山也東北流逕萊蕪谷又北逕馬陵俗名長峪道按此即晉郤克追齊至馬陵賈逵曰一作馬陘俗以為龎涓之馬陵非是出峪東流聖水入焉聖水出家桑谷又曰神泉列仙傳鹿皮公所飲者見水經又東北逕牛山折而北天齊淵水入焉又北漸平聲臨淄東城又東北逕安平故城北又東北逕樂安縣東古廣饒地又北入巨淀今清水泊又北出注馬車瀆今高家港合時水入海淄多伏流俗謂上下有十八漏按通志略曰杜預謂淄入汶班固謂淄入濟桑欽謂淄入海考其形勢當以杜為正豈其然乎諸説惟桑氏為有據不特此耳宜其以水名家也時水通志略曰一名耏襄三年齊晉盟于耏是也其源岐淺多涸竭又名乾時莊九年公與齊侯戰于乾時是也道元曰時水出齊城西南廿五里平地出泉即如水也水色黑又名黒水今按時水之原南近淄水詳其地形水脈蓋伏淄所發土人名曰烏河西北逕黄山又北逕愚山又屈而逕杜山澅水入焉澅出臨淄西南十八里所謂澅中孟子去齊三宿出畫故又名宿畱水俗謂之泥河又北逕臨淄城北系水入焉系出臨淄城西申門即申池水也門側小阜曰包山俗又名包河竝城北流分為二俱入時一支逕梧臺前西入者曰系水一支逺至博興東南李監橋入者曰澠水詳見澠水條時水又北至般陽新城縣東南索鎮口下可通舟檝又北至博興南地名灣頭濼水會焉濼即小清河又東逕利縣故城在樂安西又東逕樂安縣北又東北由馬車瀆入海水經謂時水自西安城南石羊堰分為二支津西北合黄山之德會水黄阜之南五里泉至梁鄒入濟旱則涸竭此乾時也今不通矣欽嘗自濟南䕶先妣喪由小清汎舟東下至博興泝時水南上至索鎮而登陸去益都僅九十里耳益都衆水惟此通舟未嘗淺涸焉澠水水經註澠水出臨淄縣北世謂之漢湊水逕博昌縣南貝丘齊侯田見公子彭生處又西北入時水昔晉侯與齊侯宴曰有酒如澠指喻此水也即今臨淄西門申池水北流者勢極屈曲俗稱九里十八灣過梧臺北小泥河入焉泥河出梧臺下又北至博興李監橋入時水此正澠水也魯仲連謂田單黄金横帶騁乎淄澠之間此水與淄東西竝流臨淄介其間故齊侯有酒之喻田單馳騁之地淮南子謂淄澠合流易牙嘗而别之者皆指此水也古諺謂瘦馬不渡澠南燕李宣謂澠水不冰良由逼帶京城者乃濁水耳詳見濁水條巨洋水水經云出朱虚縣東泰山國語謂之具水袁宏謂之巨昧王韶以為巨蔑或曰朐瀰或曰沬實一水也今謂之洱河出沂山西麓即東泰山也東北流至臨朐縣東南熏冶泉入焉熏冶出縣南西溪又北沙河出東阜下北來入焉又北至臨朐城東逕覆釡山又北逕委粟山水經云孤阜秀出形如委粟今名粟山又東北石溝水入焉石溝出逢山東北石澗中山即石膏山麓三成水經名北洋蓋因巨洋在南也又東北龍岡水出臨朐東北窑山東來入焉又北過益都府城東北建德水合南陽水入焉建德水出府南七里澗俗名七里河水東猶有建德村道元云建德出逢山邳泉出平地今按平地之邳泉在建德水原之東北入建德非入巨洋也南陽水見後條又東北康浪水入焉道元云康浪出劇縣西南􅛲山西流西流入巨洋即今香山南狗王河三齊略曰康浪水在齊城西南十五里康衢側寗戚扣牛角歌於此今臨淄西南泥河澅水皆微細且歌云中有鯉魚長尺半此水豈足當之寰宇記又謂康浪水在淄州皆不可信當從水經云又北逕巨昧店耿弇追張歩處又東北逕辟閭渾墓俗名釣魚臺又東北逕故益縣城古别出一支為百尺溝道元謂西北入巨淀者此溝也今廢又北逕夀光縣東北水經云舊有孔子問經石室即蒼頡墓也堯水入焉堯一名蕤又名青出府東南七十里角崩山又東北由黑冢泊入海黑冢泊述征記謂之烏常泛齊人名湖為泛冢即秦皇望海臺也余按漢志石膏山洋水所出東北至廣饒入巨淀即此水也但因北洋而誤其原因支津别出而誤云入巨淀曾肇南洋橋記乃以洋為南陽非也洋為齊之大川故以巨名道元所謂羣書盛言孟堅不應捨大而志小南陽水水經註長沙水出逢山北阜世謂之陽水北注濁水通名為陽而有南陽北陽之論又云逢山即石膏山麓三成壁立直上余按南陽水出府城西南二十五里石膏山即逢山之西麓也東北逕廣縣故城西又東北石井水注之水出劈頭山北流注井積石高深瀑布而下故曰石井亦謂之石子澗即今之瀑水澗也時有通塞南陽水又北而東貫益都南北兩城間西逕表海亭東逕故城陽王廟基古人自廟東堨斷使北注濁水今復東流十五里合建德水入巨洋北陽水漢志曰為山濁水所出東北至廣饒入巨淀水經謂之北陽亦謂之澠水出府城西南三十里九回山俗名九扈古廣縣為山也東北逕五龍口又北逕廣固廢城行於絶澗之底水激而岸峻古諺謂瘦馬不渡李宣謂逼帶京城皆指此也又北逕堯山東至東陽城北又東北逕石槽城又東北逕藏臺又北至樂安東北獾河口合女水女水見後條又東北入巨淀曾肇南洋橋記曰俗呼洋水有二曰南洋河今橋所在是也曰北洋河距城北二里者是也北洋傳記無文今出九回山入淄水此水不入淄在齊記謂之澠水道元則曰羣書盛言洋水出臨朐陽水導源廣縣兩縣雖鄰川土不同於事疑焉然則洋分南北當後魏時已不能知況後世哉今辨之曰羣書盛言出臨朐者此巨洋也漢志失其源委耳南陽自為長沙水北陽自為濁水導源廣縣者是也曾氏乃因漢志石膏山之洋水而以陽為洋誤矣蓋石膏山與逢山連麓長沙水即南陽水出其西石溝水即北洋水出其東洋水自出臨朐沂山漢志讀如詳與蜀之洋州同音故水經稱洋水則有巨洋北洋稱陽水則有南陽北陽稱南陽者無之俗所誤矣四水雖以音同致疑源流可攷惜乎曾氏之不察也天齊淵漢志曰齊所以為齊以天齊也秦祠八神一曰天主祠天齊天齊淵居臨淄南郊山下五泉竝出南郊山即牛山也按此淵在臨淄東南八里淄水之東女水之西平地出泉廣可半畝土人名曰龍池西南流入淄水牛山在淄水南遥以為志耳蘇林註曰當天中央齊也顏監曰謂其衆神異如天之腹齊齊記補引晏子曰吾聞江深五里海深十里此淵與天齊淵中浮出瓦有天齊字魏永平中水潰出木五北齊天保中又出木四皆五采類松栢而香搆亭水上臨淄俗上已祓禊于此有神祠曰休應之廟余按六書故齊夲作亦作象禾糓之秀齊也引之為整齊齊一又為國名借為人之腹齊莊子達生篇曰與齊俱入與汩俱出齊者水之旋紋今人謂之旋窠狀類腹齊豈淵泉竝出旋流如齊以其祠天稱曰天齊邪抑天然淵水猶曰齊之天淵云耳且臨淄非天地之中何謂天之腹齊深與天齊尤覺誕妄女水水經云出東安平縣􅉬頭山又名鼎足山今臨淄東南十五里俗呼二王冢者因山兩墳謂是桓公與其女之冢水出冢側因以名焉然此水通塞不常出則逕石槽城東北入北陽水水經云女水至安平城南伏流十五里然後更注陽水今石槽城古安平東北平地出泉俗名馬臺河至樂安東北獾河口合北陽水入巨淀土人云此即二王冢水伏流者未知是否齊記補引黄石公記云東海龍女隱于此石室尚存將還作此水甚有神焉化降則水生政薄則津竭述征記亦有此説恐未必然通鑑作汝水南燕汝水竭即此水也汶水水經出朱虚縣小泰山今沂山絶頂穆妃陵側有瀑布泉懸百丈崖而下即汶水也東流循鳳凰嶺折而北經大峴山隂峴水入焉穆陵闗北之水又北逕蔣峪口有水出峪中西來入焉水經有峿山水以為汶源疑即此水又北逕龜山隂山形如龜臨水乃折而東逕柴阜水經注阜南管寧冢阜北邴原冡又東北逕安丘南阜山水經註山西孫嵩冢又東北逕安丘城西又東北入于濰水經註古淳于縣濰汶交會處是也顏監曰前言汶水出萊蕪入濟今此又言出朱虚入濰將桑欽所説有異或者有二汶乎余按入濟之汶見禹貢論語之汶上書傳謂之北汶即今大清河入濰之汶見漢書入沂之汶見水經齊有三汶清河為大述征記泰山郡水皆名汶有北汶嬴汶柴汶牟汶皆源别流同又在三汶之外丹水竹書云堯放丹朱於丹水朱虚縣有丹山一名凡山黄帝所禪又名堯山下帶長阪曰破車峴東西二丹水出焉記謂丹朱弄兵之所今按西丹出丹山在臨朐縣東北三十里東丹出方山在丹山東北寰宇記丹山角崩方山逺望正方二水皆北流至昌樂廢城西北乃相合通名為丹河北入于海寰宇記丹水入昌樂縣界引以溉田今按齊地衆水可引溉者極多古人陂渠遺迹猶有存者自宋時至于今民俗偷惰為政者何慮及此然則史令所譏豈特西門豹也哉白狼水水經註出丹山逕北海郡城東入别畫湖亦曰朕懷湖東北入海余按白狼有二源一出丹山隋志作白狼山一出北海縣南小王莊平地泉湧如輪上源合此始大逕濰州東門外古有石梁金泰和間僧普濟所修遺迹尚存又東北過寒亭合溉水入湖由湖入海溉水出塔山寰宇記云山形如塔又名溉源山即今東虞河以州西有西虞河故此云東西虞出黄山又有朱流河出方山七里河出蒙姑山三水皆在州西北流入海巨淀馬車瀆漢志曰為山濁水所出東北至廣饒入鉅定又曰馬車瀆首受鉅定東北至琅槐入海定作淀水澤名縣因氏焉即今樂安東北清水泊也北出為馬車瀆今高家港也淄水濁水入巨淀時水入馬車瀆同歸于海南洋橋記乃以鉅定為巨洱河今巨洱自夀光東北入黒冡泊巨淀馬車在夀光西北相去六十餘里不合漢書首受鉅定之文濁水亦無入巨洱之理曾子開誤矣溝洫志東海引鉅定溉田鉅定澤名東海無此澤寰宇記膠水南定渚渠即漢武所耕處非東海地膠水水經云出黔陬膠山今膠州膠西縣西南鐵橛山也北逕密州東北鹵山古名五弩山鹵水入焉寰宇記膠水出密州諸城縣東㟡山或亦曰膠水出鹵山皆非是又北逕高密縣東北入都濼都濼者水經謂之夷安潭秦地圖謂之劇清池即古貕養澤也張奴水出高密東阜下亦注此澤自澤北出注新河張奴水一名墨水水側有張奴店由河北入于海其東北入海者膠水之故道差淺而新河為經流新河者至元初萊人姚演建言首起膠西縣東陳村海口自東南趍西北鑿陸地數百里欲通漕直固海口數年而罷余嘗乗傳過之詢土人云此河為海沙所壅又水潦積淤終不能通徒殘人耳演真鄭國之罪人也姑尤水左傳昭二十年姑尤以西注齊東界姑水尤水皆在城陽郡東南入海今按沽水有二曰大沽河出黄縣南蹲狗山俗名狗兒山曰小沽河出萊州南馬鞍山二水俱南流逕膠水縣東南朱毛城東朱毛即古即墨城乃相合通名為沽河至膠州東南入海沽水起北海至南海行三百餘里絶齊東界故曰沽尤以西尤即小沽河耳沂水鄭康成云沂水出沂山水經云出蓋縣艾山寰宇記艾山一名臨樂山在新泰縣東北三十里道元則曰沂有二源一出柞泉山一出魚窮山余按今蒙隂縣東北地名南河川小阜之下有曰狗泉泉傍神祠塑黑狗不知何據疑此則臨樂山也此沂源也東南逕馬頭固山有泉東流與之合北望沂山五十里殊無别源據周禮沂山因沂水得名康成又齊之大儒不應有誤疑沂山水源古流今竭耳沂水過馬頭固南流逕蓋縣故城又南至沂水縣城西又南至河陽村桑泉水西來入焉道元云桑泉出五女山南流納堂阜水即今蒙隂東北憚阜大小二河也又南合蒙隂水通名為汶河東注沂水經桑泉亦稱汶故今云沂水又南逕諸葛城又南逕王祥墓孝感水入焉其水出墓西戚溝湖剖氷躍鯉之地又南至沂州城東小沂水西來入焉小沂出蒙山西東過費縣神山納祊水祊出縣南闗陽川至沂州西又分為洓水涑自州城西小沂自城北俱入沂宋慶歴間沂州修城碑云大小二沂環流外轉而小沂尤湍于西北平日波如簟紋清淺可愛及山雨水至如百萬陣馬摩壘而來謂此水也沂水又南分流入三十六穴湖東通沭水詳見沭水條又南逕古郯城又南至下邳入泗下邳古城在今邳州南道元云沂水至下邳分為二一自城北趍西南入泗一自城之東南入泗東沂水上有橋郡國志謂之長利池徐泗間呼為圯音怡橋也子房遇黄石公進履處今入泗者西沂耳沭水水經註大弁山與小泰山連麓沭水出焉大弁今訛作大屏漢志謂之術水元和志云俗名漣水出沂山東麓經大峴山峴水入焉穆陵闗南入沭之水又南至老牛嶺嶺長二十五里折而東逕􅛲山􅛲水入焉􅛲水出􅛲山水經謂之箕水又南至洛山洛水西來入焉洛水出壇頭山又南經莒州城東又南沙河水西來入焉沙河首受西湖水湖受黄華諸水皆莒城西北羣山泉瀦為湖又南温泉西來入焉泉出沂州東北陽山古名温水阪鼎足三穴沸如湯道元謂西入沂非也又東逕倉山道元云山上有鹽官城即漢封劉釘之利城武陽溝水出此東入沭今屬贛榆縣馬嶺羽山殛鯀山也元和志在臨沂縣東南百十里是也由吾寰宇記巨平山南有由吾廟隋文帝徴道士由吾拜諫議大夫卒葬此山水經又云沭水經司吾山東疑即巨平山也漢有司吾縣羣山聮絡沭東沂西夾山而行山峽之間有山口池者俗云禹鑿沂水由三十六穴湖貫此峽口與沭相通道元謂辟陽水首受葛陂水入沭者蓋此水也今沂州東北有葛溝也又南至沭陽縣入桑塸湖烏侯切道元謂桑塸水出桑賁東入沭湖因此名元和志云碩濩湖在沭陽縣東八十里與朐漣水縣三分湖為界今訛作桑口湖由湖東出入于海沭水至此正名漣水故縣氏焉道元又謂沭水下流古分為二今名南漣北漣魏正元中齊王鎮徐州立大堰遏水西流兩瀆之會置城防之名曰曲沭戍其流西入淮陽由下邳入泗余按宋金相拒宋人亦堰此水乃防北敵遺迹在今海寧沭陽界中泇水音加俗作去聲讀泇水有二東泇出沂州西北其山城内普照寺有金僧居山頌碑作其山南流至卞莊站國初立站今廢東分一支入芙蓉湖溉田數千頃湖在沂州東南芙蓉山下香粳鍾畝古稱琅邪之稻即此西泇出嶧州東北抱犢山東南流至三合村與東泇合又有魚溝水出浮丘山合於此故名三合南貫四湖溉田倍芙蓉又南合武河入于泗謂之泇口淮泗舟楫通焉元和志云承縣界有陂十三所皆貞觀以來修立以溉田者今沂嶧二州仰泇承二水溉田青徐水利莫與為匹皆十三陂之遺迹也武河者疑即漢志冠石山之武水水經亦謂之小沂上流有故渠俗名文河土人云浚此渠六十里使武河通沛可避吕梁徐洪之險而徑逹新濟矣徐邳人恐徙河無業每沮之承水音澄漢縣名元和志云承縣以西北承水得名寰宇記云承治水出縣西北方山王莽改承縣為承治故水有此名今又訛為承冶夲出嶧州北六十里花􅋥山之車梢峪源曰滄浪淵淵旁有龍祠宋政和間賜額霖澤廟其水南流合許池泉今滄浪淵水微細不及獨許池為正源矣承水又南逕州城西門又南納金注河又東會武河南入于泗承水溉田千餘頃旁多美竹人賴其利南梁水後漢志魯郡蕃縣蕃音皮有南梁水道元曰蕃縣東北平澤泉若輪焉南鄰于漷亦謂之西漷水首受蕃縣西注山陽湖陸二水皆由沛入泗今按南梁水出滕縣荆溝村西南流至滕州東門外折而過城北又西入山陽湖山陽俗曰刀陽由湖南出注于泗南有薛水即古漷水出州東高山春秋魯取邾田自漷水杜注水出東海合鄉縣西南經魯國至高平湖陸縣入泗蓋此水也又有沙河水出鄒嶧山皆西南流至山陽湖與南梁相合同入于泗名三河口般陽水籠水水經註作龍水南出長城中寰宇記云古名孝水齊有孝婦顏文姜事姑孝養逺道取水不以寒暑易心感得靈泉生於室内文姜常以緝籠蓋之姑怪其須水即得值姜不在入室發籠觀之水即噴涌壞其居宅故俗呼為籠水今孝婦河也出益都縣顔神鎮孝婦祠下古齊長城踰泰山東亘于此西逕萊蕪山隂北注般陽城西般水入焉般亦名左阜水出淄川縣東南龍山龍灣洞俗名頭河西北流至般陽城東分為二一支逕城南一支環城西北俱入籠故水經云般陽縣在般水之陽也籠水又北逕長山縣西又北逕鄒平縣東蒙河水入焉蒙水俗名沙河出長白山葫蘆峪水經謂之魚子溝又北逕新城縣西又北入小清河濟南水濼水源曰趵突流曰濼東導曰小清曾南豐齊州二堂記曰泰山北與齊東南諸谷之水西北匯于黑水之灣又西北匯于柏崖之灣而至于渴馬之崖則泊然而止今黄山下自崖以北至于歴城之西蓋五十里有泉湧出高或致數尺名曰趵突之泉齊人謂嘗有棄糠于黑水灣者見之于此其注而北則謂之濼水春秋桓公十八年會齊侯于濼是也今府城西平地泉源觱湧雪濤數尺聲如隱雷旁合馬跑金線諸泉周可數畝北出又合蜜脂五龍衆泉竝城北流屈而東至城北水門大明湖水出而注之東北至華不注山合華泉即齊頃公下如華泉取飲者三齊記云歴山下有無底井與此泉通山之西南引水溉田水經謂之歴水陂餘波西注大清曰聽水即今之響河古濼水自華不注山東北入大清河偽齊劉豫乃導之東行為小清河自歴城東逕章丘鄒平又東逕般陽之長山新城又東逕高苑至博興合時水東北至馬車瀆入海曲行幾五百里故自濟南東傳博興南源衆水古入濟者今竝入小清焉小清為運鹽河初行高苑縣北金皇綂間縣令高通改由縣南長沙溝然此水迂曲上流岐淺鹽舟多梗議者欲引孝婦水西注上流非計也蓋小清舟不過欲達大清耳若自博興引渠至蒲臺立堰平原僅五十里徑達大清矣大明湖水經註濼水北為大明湖西有大明寺水成淨池池上有亭湖水引瀆東入西郭而側城北注又上承東城歴下泉源競發北流出郭注濼水詳此則大明湖亦源于濼城西五龍潭側古有北渚亭豈池亭遺跡邪湖今在府城内周十餘里即歴下泉源競發北流出郭者也歴下名泉有曰金線趵突東曰皇華曰柳絮曰臥牛金線東曰東高曰漱玉金線南曰無憂曰石灣趵突南曰酒泉曰湛露無憂西曰滿井曰北煑糠趵突北曰北珍珠白雲樓前曰散水曰溪亭北珍珠東曰濯纓北珍珠西曰灰泉濯纓西北曰知魚灰泉東南曰朱砂灰泉西府城内灰泉最大自北珍珠以下皆匯於此周回廣數畝當是大明湖之源也曰劉氏北珍珠西北曰雲樓劉氏南曰登州曰望水萬竹園内曰洗鉢登州東北曰淺井曰馬跑洗鉢西南曰舜泉舜祠下曰香泉舜泉西曰鑑泉舜泉南曰杜康南舜廟曰金虎曰黑虎李承務巷曰東蜜脂金虎西南曰西蜜脂東蜜脂西曰孝感孝感坊内曰玉環同知巷前今憲衙街曰羅姑塌行街東曰混沙曰灰池城西南角塲下曰南珍珠鐵佛巷東曰芙蓉姜家亭前曰滴水又名清泉西務北曰灰灣曰懸清城西五龍堂東曰雙桃城西丁字街北曰温泉城西石橋北城下曰汝泉神童寺内曰龍門一名龍泉神童寺東曰染池龍門東曰懸泉中宫東曰都泉中宫東南曰柳泉曰車泉中宫東逺東莊曰煑糟四里山南曰爐泉南山下曰白虎曰甘露大佛山曰林汲佛峪内曰白泉王舎店北曰金沙曰白龍龍洞山中曰花泉張馬泊曰獨孤靈巖寺曰醴泉黌堂嶺北曰漿水盤水鎮東南曰南煑糠䗶山窩北曰苦苣柳鋪東曰熨斗黎峪門家莊曰鹿泉石固寨曰龍居長城嶺西合趵突百脈總七十二見名泉碑然逺至中宫靈巖諸泉具載而華不注之華泉明水鎮之淨明泉皆失不取況其名亦未甚雅稱蓋當時俗筆欽嘗擬會波樓記略云濟南山水甲齊魯泉甲天下蓋他郡有泉一二數此獨以百計濤噴珠躍金霏碧渟韻琴筑而味肪醴不殫品狀在邑者瀦市之半在郭者環城之三棊布星流走城北陬匯于水門東流為濼竝于汶過于時入于海可㮣見矣百脈水水經出土鼔縣故城西元和志出亭山縣東北亭山在府城東南九十里源方百歩百泉俱發故曰百脈即繡江源也郡國志云十二斤溝俗名麻灣出章丘縣南明水驛明水一名淨明泉出百脈西北石橋邊其泉至潔纎塵不留土人以洗目退昏翳與西麻灣水合流三里餘入繡江乃東北流逕東陵山漸章丘東城又北入小清河縣東七里有揚緒水一名獺河水經云出逢陵故城西南經章丘城北入濟水今按獺河出長白山之王村峪經章丘東北入小清河曽南豐齊州二堂記云太山之北與齊東南諸谷之水西北匯于黒水之灣又西北匯于柏崖之灣而至于渴馬之厓泊然而止至歴城西湧出趵突之泉嘗有棄糠於黑水灣者見之于此其注而北謂之濼水齊多甘泉顯名者十數而色味皆同皆濼水之旁出者蔡氏援此以證濟水之伏破程氏之論當矣又取沈存中筆談謂歴下發地皆泉濟水經過其下自相矛盾何邪且古濟行清河如在井底南仰泉源遙在山麓豈能相及今黄山渴馬厓水伏而可證又龍洞山中朗公谷諸水東西伏流土人云西發趵突東發百脈驗之信然蓋歴下衆泉皆岱隂伏流所發西則趵突為魁東則百脈為冠地勢使然何闗于濟存中得之傳聞九峯按圖索駿容有疑誤近官濟南者遂定以濼為濟建濟瀆廟于泉上謬矣巨合水水經註巨合水南出雞山北逕巨里故城耿弇討費敢處又北合武原水入濟按巨里在歴城東七十里自宋為龍山鎮巨合水出鎮南五十里曰榆科泉逕巨里西武原水出鎮南十餘里曰江水泉逕巨里東俗訛為東西巨冶河俱北流五里餘乃相合北入小清河巨合之得名以此道元云巨里三靣有城西有深坑坑西即耿弇營蓋二水環遶因崖以城為險固也大清河古濟今汶水經註濟枯渠注巨野澤澤北則清水巨野今梁山泊也北出為清河古自夀張縣安民亭亭北對安民山今曰安山合汶水汶出泰安萊蕪縣原山之陽水經謂之北汶西南逕徂徠山隂又西逕泰山之陽漢武明堂遺跡臨水謂之石汶又西逕汶上縣北又西逕東平城南其西即安山閘閘下泥河口有亭子店古安民亭遺趾清濟與汶合處今閘清水南導任城則清濟不入汶汶自行古清河矣汶水又北逕漁山東即瓠子歌之吾山在安山東有漢隄遺跡自西而東屬之麓山西曹子建冢山東漢黄河故渠又北逕陽榖縣西流水合狼水入焉又東北逕東阿縣道元云縣東北有清亭春秋隱四年遇于清以河得名也又東北逕平隂縣廣里保古齊長城防門河道所由春秋齊侯塹防是也廣里見水經又名光里又北逕巫山齊侯登以望晉師者俗訛作無兒山山上有石室水經謂之孝子堂今曰郭巨廟清水過此古為湄湖又東北逕齊河縣縣南門外有梁跨水古朝陽橋遺跡耿弇渡處齊河縣在宋為耿濟鎮沙溝水出山茌縣南來入焉今肥城縣東南有沙溝鎮以水得名又北逕上濼橋北濼水分響河入焉古名聽水又東北逕華不注山隂又東逕下濼堰濼水舊入濟處堰南即小清河又北逕臨邑縣又東北逕陽縣又北逕齊東縣河間路屬縣古東鄒又東北逕蒲臺縣又東北逕高苑縣北又北逕利津縣城東又東北入于海水經云濟至古平安為淵渚謂之平州坈又東北至琅槐鄉有古黄河通濟枯渠謂之漯河又東北入海元和志謂海浦浦旁有一沙阜高丈餘俗呼鬬口淀濟水入海與海潮相鬬故名淀上有井極甘海潮不能沒朱子韓文考異曰按水經河水至東阿茌平等縣東北流四瀆津灌注之河水東分濟水受河蓋滎口水斷不通始自是出與清水合昔趙殺鳴犢孔子臨河而嘆作歌曰狄之水兮風揚波舟檝顛倒更相加歸來歸來胡為期按臨濟故狄也是濟所經得其通稱詳此則是濟水自滎澤之下濳流至此四瀆津口而復出河又東分一支與之合流以過臨濟而為狄水然此皆齊地在今濟鄆之間史記以為孔子自衞將西見趙簡子則其道不當出此此又不可曉者今姑闕之以俟深於地理者考焉欽按漢陳留郡平丘縣有臨濟亭故狄也蓋濟水出陶丘北南瀆被孟豬北瀆注巨野亭臨此瀆故曰臨濟春秋時狄人據此因以名焉此水夫子所歌至王莽時枯竭水經所謂濟枯渠注巨野者也其自巨野北出至四瀆津與河合流者乃齊之清河水經所謂得其通稱者是也漢千乘别有狄縣安帝更名臨濟唐又别以漢東朝陽為臨濟今章丘之臨濟鎮也文公蓋疑于此云古河朱文公九歌註曰禹治河至兖州分為九道以殺其溢其間相去二百餘里徒駭最北鬲津最南徒駭是河之本道東出分為八枝也胡氏大記曰大陸澤北九河之地平延漫流易淤故禹多與之地使下流通曠齊桓擅一時之利適河行徒駭因以八河之地充樹藝立城邑下流始廹溢為患欽按河過大陸趨海勢大土平遷徙不常自播為九禹因而疏之非河獨行經流禹於旁近支鑿以殺其溢也禹後歴三代至齊桓時千五百餘年矣支流漸絶經流獨行亦理勢如此非齊桓冒曲防之禁故塞九河實九河自為平陸可樹藝耳至定王五年河遂南徙砱礫漢世漸決而南元帝永光中決于清河分流入博州後又決于平原乃東入青齊二州之境遂由漯川與濟竝行入海宋紹熙以後乃南連大野并泗入淮金初又改由渦近嵗復由泗入淮河濁淮泗俱清清淮勢大可以吞伏故下流無淤塞之患惟汴宋之郊􅋥屈平壤潰決如故自定王以來又千五百餘年河自北而南徙千餘里今按桑田之地講求變遷之陵谷欲盡合古書難矣漢世去古未逺河隄都尉許商言九河故道謂徒駭在成平金獻州樂夀縣景城鎮古有成平城胡蘇在東光今景州東光縣東連滄州古有胡蘇亭鬲津在鬲縣德州有鬲縣城曰太史曰馬頰曰覆釡在東光之北成平之南曰簡曰潔曰鉤􅋥在東光之南鬲縣之北斯言簡而近實後世圖志雖詳反見淆亂欽嘗徃來燕齊西道河間東履清滄熟訪九河故道蓋昔北流衡漳注之今之御河漢初猶入河漢魏時名漳水隋唐以來名御河河既東徙漳自入海安知北流之漳非古徒駭河歟宋會要神宗熈寧三年議開御河臣竂奏云可以恩州武城縣䦕約二十餘里入黄河北流故道下五股河詳此則御河入黄河北流故道無疑也踰漳而南清滄二州之間有古河隄岸數重地皆沮洳沙鹵太史等河當在其地滄州之南有大連澱今曰大梁五龍堂宋碑作大連疑即隋末羣盗所據之豆子䴚也西踰東光東至海此非胡蘇河歟澱南至西無棣縣百餘里間有曰大河曰沙河皆瀕古隄縣北地名八會口土人云因河會得名縣城南枕無棣溝兹非簡潔等河歟無棣溝通海隋末廢塞唐薛元鼎開之百姓歌曰新河得通舟楫利直達滄海魚鹽至昔日徒行今騁駟美哉薛公德滂被凡此溝澱今皆為鹽司堰塞平時瀦水不通纔遇霪雨水即潰溢故河間清滄之地常被水害無有寧歲吾友伯荅爾都水嘗言撥丁河數塲醝課與山東運司帶辦廢堰泄水則河間永無患矣執政無識竟沮之良可歎矣東無棣縣北有䧟河濶數里西通德棣東至海兹非所謂鉤􅋥河歟德州有􅋥河鎮濵州北有士傷河西踰德棣東至海兹非鬲津河歟士傷河最南比他河差狹是為鬲津無疑也所謂士傷者土人云昔日戰塲因傷賢人故云按水經漢安帝時劇縣賊畢豪等乗船冦平原縣令劉雄門下小吏所輔浮舟追至厭次津戰敗為賊所擒輔求代雄豪縱雄殺輔于此津蓋此河也蔡氏書傳乃曰自漢以來講求九河皆無依據祖王横之言引碣石為證謂九河已淪於海欽按禹貢文北過洚水至於大陸又北播為九河同為逆河入于海大陸在邢趙深三州之地爾雅之廣河澤也去海岸已數百里大陸又曰鉅鹿呂氏春秋曰鉅鹿之北遂分為九河路史云九河始元城大名縣西三里有故瀆鄭夾漈謂大陸非趙地之廣河澤乃汲郡之呉澤也如此則又逺之矣又東至海中始敘九河則大陸與九河相離千里如是之逺而絶無表志不合禹貢之文其不可信一也王横謂海溢出浸數百里而青兖營平郡邑不聞有漂沒之處而獨浸九河其不可信二也今平原迤北清滄之間雖為樹藝城邑相望而地形河勢高隱曲折徃徃可尋但禹初為九厥後或三或五遷變多寡不同必欲按名而索故致後儒紛紛之論不得不辨海海岱惟青州謂東北跨海西南距岱跨小海也本名渤海亦謂之渤澥海别枝名也蓋太行恒嶽北徼之山循塞東入朝鮮今高麗海限塞山有此一曲北自平州碣石南至登州沙門島是謂渤海之口濶五百里西入直沽幾千里焉漢王横乃謂九河之地淪為小海然則唐虞之時青州跨海者跨何海邪且海溢出浸數百里何自秦漢以來青兖營平郡縣不聞有漂沒之者足證横失海溢者有之横言之過也近世蔡氏書傳金履祥通鑑前編皆祖横説又謂小海所淪青兖北境悉非全壤豈二州北境有荒漠棄地為海所漸而歴代信史不之書邪無是理也蓋因委九河於海中指碣石在海外遂有此論今青境無缺兹不必辨古兖之地自今濟南以西北包濵棣滄瀛帶雄鄚西襟深兾南遶曹濮東括魯鄆四至亦不狹矣在春秋戰國其地𤓰分後世從而小之未詳考也金氏又云碣石有二在高麗者曰左碣石在平州者正禹貢之右碣石也乃今沙門島對岸之鐵山正當渤海之口果為右碣石則唐虞之時青兖東北直岸大海無渤海矣此又可信邪今齊境東南則日照即墨膠州正東則寜海登州皆岸大海東北則萊濰昌邑正北則博興夀光西北則濵棣二州皆岸渤海云齊乘卷二
