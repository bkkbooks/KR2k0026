body:
  text: 齊乘地理類三都會郡縣之屬提要臣等謹案齊乘六卷元于欽撰欽字思容青州人厯官兵部侍郎是書専記輿地凡分八類曰沿革曰分野曰山川曰郡邑曰古迹曰亭館曰風土曰人物敘述簡核而淹貫地志中之有古法者其中間有舛誤如宋建隆三年改濰州置北海軍以昌邑縣𨽻之乾道三年復升濰州又增昌樂𨽻之均見宋史地理志而是書獨遺漏未載又夀光為古莒國亦不及詳其他如以華不注為磨笄山以臺城為在濟南東北十三里顧炎武山東考古録皆嘗辨之然欽本齊人援據經史考證見聞較他地志之但據輿圖憑空言以論斷者實為詳確可信故向來推為善本卷首有至元五年蘇天爵序亦亟稱之云乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀齊乘原序齊乘六卷故兵部侍郎于公志齊之山川風土郡邑城郭亭館丘壠人物而作也古者郡各有志中土多兵難書弗克存我國家大德初始從集賢待制趙忭之請作大一統志蓋欲盡述天下都邑之盛書成藏之祕府世莫得而見焉于公生于齊官于齊考訂古今質以見聞歲久始克成編辭約而事核公在中朝為御史憲臺都事左司員外郎終益都田賦總管以文雅擅名當時既卒其家蕭然獨遺是書于其子濳余官維揚始得閲之嗚呼齊地之強民物之夥自古然也桓公任管仲以成霸業聖人嘗稱其功謂一變能至於魯後世去古雖逺山川郡邑猶存革其俗以化其民獨不在夫上之人乎當漢之始兵戈甫定曹參為齊相師禮蓋公以清靜化民齊乃大治兹非其效歟今齊為山東重鎮所統郡縣五十有九宦遊于齊者獲是書觀之寧無益乎豫於于公之言重有感焉謂三代兩漢人材夲乎學校之教養謂風俗自漢晉以降愈變而愈下美昔人之賑飢有道歎近世之採金病民以稷下學術流于異端以海上求仙惑于神異斯亦足以慨公之志矣夫公諱欽字思容益都人濳擢南行臺掾云至元五年己卯冬十月丙戌朔嘉議大夫江北淮東道肅政廉訪使蘇天爵序
